<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shavuot Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-title">
      <h1>Shavuot Gallery</h1>
      <p>Visual meditations on Matan Torah</p>
    </div>
    <button id="theme-toggle" aria-label="Toggle light/dark theme">&#9680; Light / Dark</button>
  </header>
  <main>
    <div id="filter-row" class="filter-row"></div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </main>

  <dialog id="piece-dialog" aria-modal="true" aria-label="Piece viewer">
    <div class="modal-inner">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <iframe id="piece-frame" title="Piece viewer" allowfullscreen></iframe>
    </div>
  </dialog>

  <script>
    (function () {
      const grid = document.getElementById('gallery-grid');
      const filterRow = document.getElementById('filter-row');
      const dialog = document.getElementById('piece-dialog');
      const frame = document.getElementById('piece-frame');
      const closeBtn = document.getElementById('modal-close');
      let pieceCards = [];
      let focusedIdx = -1;

      const root = document.documentElement;
      root.dataset.theme = localStorage.getItem('theme') || 'dark';
      document.getElementById('theme-toggle').addEventListener('click', function () {
        const next = root.dataset.theme === 'light' ? 'dark' : 'light';
        root.dataset.theme = next;
        localStorage.setItem('theme', next);
      });

      function openPiece(path) {
        frame.src = path;
        if (!dialog.open) dialog.showModal();
      }

      function closePiece() {
        dialog.close();
        frame.src = '';
      }

      closeBtn.addEventListener('click', closePiece);

      dialog.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closePiece();
      });

      dialog.addEventListener('click', function (e) {
        if (e.target === dialog) closePiece();
      });

      function applyFilter(theme) {
        pieceCards.forEach(function (card) {
          card.style.display = (!theme || card.dataset.theme.toLowerCase().includes(theme.toLowerCase())) ? '' : 'none';
        });
      }

      function setActiveChip(theme) {
        filterRow.querySelectorAll('.filter-chip').forEach(function (chip) {
          chip.classList.toggle('active', chip.dataset.theme === theme);
        });
      }

      function selectTheme(theme) {
        setActiveChip(theme);
        applyFilter(theme === 'All' ? '' : theme);
        location.hash = theme === 'All' ? '' : 'theme=' + encodeURIComponent(theme);
      }

      function buildChips(pieces) {
        var themes = ['All'].concat([...new Set(pieces.map(function (p) { return p.theme; }))].sort());
        themes.forEach(function (theme) {
          var btn = document.createElement('button');
          btn.className = 'filter-chip';
          btn.dataset.theme = theme;
          btn.textContent = theme;
          btn.addEventListener('click', function () { selectTheme(theme); });
          filterRow.appendChild(btn);
        });
      }

      function buildCard(piece) {
        const card = document.createElement('article');
        card.className = 'piece-card';
        card.dataset.theme = piece.theme || '';
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', piece.title);

        const img = document.createElement('img');
        img.src = piece.thumbnail;
        img.alt = piece.title + ' thumbnail';
        img.loading = 'lazy';

        const overlay = document.createElement('div');
        overlay.className = 'card-overlay';

        const titleEl = document.createElement('div');
        titleEl.className = 'card-title';
        titleEl.textContent = piece.title;

        const taglineEl = document.createElement('div');
        taglineEl.className = 'card-tagline';
        taglineEl.textContent = piece.tagline;

        overlay.appendChild(titleEl);
        overlay.appendChild(taglineEl);
        card.appendChild(img);
        card.appendChild(overlay);

        function activate() {
          focusedIdx = pieceCards.indexOf(card);
          openPiece(piece.path);
        }
        card.addEventListener('click', activate);
        card.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            activate();
          }
        });

        return card;
      }

      fetch('pieces.json')
        .then(function (res) {
          if (!res.ok) throw new Error('Failed to load pieces.json: ' + res.status);
          return res.json();
        })
        .then(function (pieces) {
          pieces.forEach(function (piece) {
            grid.appendChild(buildCard(piece));
          });
          pieceCards = Array.from(grid.querySelectorAll('.piece-card'));

          pieceCards.forEach(function (card, i) {
            card.addEventListener('focus', function () { focusedIdx = i; });
          });

          document.addEventListener('keydown', function (e) {
            if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
            const visible = pieceCards.filter(function (c) { return c.style.display !== 'none'; });
            if (visible.length === 0) return;
            e.preventDefault();
            const curCard = focusedIdx >= 0 ? pieceCards[focusedIdx] : null;
            let curVisIdx = curCard ? visible.indexOf(curCard) : -1;
            if (e.key === 'ArrowRight') {
              curVisIdx = Math.min(curVisIdx + 1, visible.length - 1);
            } else {
              curVisIdx = Math.max(curVisIdx - 1, 0);
            }
            const target = visible[curVisIdx];
            focusedIdx = pieceCards.indexOf(target);
            target.focus();
            target.click();
          });

          buildChips(pieces);
          var raw = location.hash.startsWith('#theme=') ? location.hash.slice(7) : '';
          var initial = raw ? decodeURIComponent(raw) : 'All';
          selectTheme(initial);
        })
        .catch(function (err) {
          const msg = document.createElement('p');
          msg.className = 'error-message';
          msg.textContent = 'Could not load gallery: ' + err.message;
          grid.appendChild(msg);
        });
    })();
  </script>
</body>
</html>
