<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1A1208"/>

  <!-- trunk from Sinai label down -->
  <line x1="200" y1="60" x2="200" y2="110" stroke="#C8881A" stroke-width="3" stroke-linecap="round"/>

  <!-- Generation 1 branches (Moses) -->
  <line x1="200" y1="110" x2="140" y2="155" stroke="#C8881A" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="110" x2="260" y2="155" stroke="#C8881A" stroke-width="3" stroke-linecap="round"/>

  <!-- Generation 2 branches (Joshua) -->
  <line x1="140" y1="155" x2="100" y2="200" stroke="#C8881A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="155" x2="175" y2="200" stroke="#C8881A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="155" x2="225" y2="200" stroke="#C8881A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="155" x2="300" y2="200" stroke="#C8881A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Generation 3 branches (Elders) -->
  <line x1="100" y1="200" x2="72" y2="245" stroke="#C8881A" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="200" x2="120" y2="245" stroke="#C8881A" stroke-width="2" stroke-linecap="round"/>
  <line x1="175" y1="200" x2="155" y2="245" stroke="#C8881A" stroke-width="2" stroke-linecap="round"/>
  <line x1="175" y1="200" x2="190" y2="245" stroke="#C8881A" stroke-width="2" stroke-linecap="round"/>
  <line x1="225" y1="200" x2="210" y2="245" stroke="#C8881A" stroke-width="2" stroke-linecap="round"/>
  <line x1="225" y1="200" x2="245" y2="245" stroke="#C8881A" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="200" x2="280" y2="245" stroke="#C8881A" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="200" x2="328" y2="245" stroke="#C8881A" stroke-width="2" stroke-linecap="round"/>

  <!-- Generation 4 branch stubs (Prophets) -->
  <line x1="72" y1="245" x2="55" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="72" y1="245" x2="82" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="120" y1="245" x2="108" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="120" y1="245" x2="132" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="155" y1="245" x2="142" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="155" y1="245" x2="163" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="190" y1="245" x2="180" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="190" y1="245" x2="198" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="210" y1="245" x2="202" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="210" y1="245" x2="218" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="245" y1="245" x2="237" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="245" y1="245" x2="257" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="280" y1="245" x2="268" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="280" y1="245" x2="290" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="328" y1="245" x2="316" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="328" y1="245" x2="340" y2="285" stroke="#C8881A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Electron Head glow dots at branch tips (Generation 4 level) -->
  <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFAF0" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#FFFAF0" stop-opacity="0"/>
  </radialGradient>

  <!-- Animated pulse trail on trunk (simulated static view) -->
  <circle cx="200" cy="80" r="5" fill="#FFFAF0" opacity="0.9"/>
  <circle cx="200" cy="80" r="12" fill="url(#bloom)" opacity="0.6"/>
  <circle cx="200" cy="90" r="4" fill="#8B2500" opacity="0.8"/>

  <!-- Pulse trail on left branch -->
  <circle cx="170" cy="132" r="4" fill="#FFFAF0" opacity="0.8"/>
  <circle cx="170" cy="132" r="10" fill="url(#bloom)" opacity="0.5"/>
  <circle cx="178" cy="120" r="3" fill="#8B2500" opacity="0.7"/>

  <!-- Pulse trail on right branch -->
  <circle cx="230" cy="132" r="4" fill="#FFFAF0" opacity="0.8"/>
  <circle cx="230" cy="132" r="10" fill="url(#bloom)" opacity="0.5"/>
  <circle cx="222" cy="120" r="3" fill="#8B2500" opacity="0.7"/>

  <!-- White-gold tip dots at generation 5 level -->
  <circle cx="55" cy="285" r="3" fill="#FFFAF0" opacity="0.7"/>
  <circle cx="82" cy="285" r="3" fill="#FFFAF0" opacity="0.7"/>
  <circle cx="108" cy="285" r="3" fill="#FFFAF0" opacity="0.6"/>
  <circle cx="132" cy="285" r="3" fill="#FFFAF0" opacity="0.6"/>
  <circle cx="142" cy="285" r="3" fill="#FFFAF0" opacity="0.5"/>
  <circle cx="163" cy="285" r="3" fill="#FFFAF0" opacity="0.5"/>
  <circle cx="180" cy="285" r="3" fill="#FFFAF0" opacity="0.5"/>
  <circle cx="198" cy="285" r="3" fill="#FFFAF0" opacity="0.5"/>
  <circle cx="202" cy="285" r="3" fill="#FFFAF0" opacity="0.5"/>
  <circle cx="218" cy="285" r="3" fill="#FFFAF0" opacity="0.5"/>
  <circle cx="237" cy="285" r="3" fill="#FFFAF0" opacity="0.6"/>
  <circle cx="257" cy="285" r="3" fill="#FFFAF0" opacity="0.6"/>
  <circle cx="268" cy="285" r="3" fill="#FFFAF0" opacity="0.7"/>
  <circle cx="290" cy="285" r="3" fill="#FFFAF0" opacity="0.7"/>
  <circle cx="316" cy="285" r="3" fill="#FFFAF0" opacity="0.6"/>
  <circle cx="340" cy="285" r="3" fill="#FFFAF0" opacity="0.6"/>

  <!-- Sinai label at top -->
  <text x="200" y="50" text-anchor="middle" font-family="serif" font-size="22" fill="#FFFAF0" opacity="0.95" direction="rtl">סיני</text>

  <!-- Faint generation labels -->
  <text x="200" y="370" text-anchor="middle" font-family="serif" font-size="11" fill="#C8881A" opacity="0.55">Moses Received and Transmitted — Wireworld / Pirkei Avot</text>
</svg>
