<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1A0E04" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080400" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#140C03"/>

  <!-- Amber stream — wide soft glow -->
  <path d="M 0,265 C 55,263 95,275 135,258 C 165,244 182,228 210,242 C 238,256 278,270 400,252"
        fill="none" stroke="#D4890A" stroke-width="40" stroke-opacity="0.12" filter="url(#blur1)"/>
  <path d="M 0,265 C 55,263 95,275 135,258 C 165,244 182,228 210,242 C 238,256 278,270 400,252"
        fill="none" stroke="#D4890A" stroke-width="22" stroke-opacity="0.28"/>
  <path d="M 0,265 C 55,263 95,275 135,258 C 165,244 182,228 210,242 C 238,256 278,270 400,252"
        fill="none" stroke="#E8A020" stroke-width="7" stroke-opacity="0.60"/>

  <!-- Cream stream — wide soft glow -->
  <path d="M 0,135 C 55,137 95,125 135,142 C 165,156 182,172 210,158 C 238,144 278,132 400,148"
        fill="none" stroke="#FFF8E7" stroke-width="40" stroke-opacity="0.07" filter="url(#blur1)"/>
  <path d="M 0,135 C 55,137 95,125 135,142 C 165,156 182,172 210,158 C 238,144 278,132 400,148"
        fill="none" stroke="#FFF8E7" stroke-width="22" stroke-opacity="0.18"/>
  <path d="M 0,135 C 55,137 95,125 135,142 C 165,156 182,172 210,158 C 238,144 278,132 400,148"
        fill="none" stroke="#FFF8E7" stroke-width="7" stroke-opacity="0.48"/>

  <!-- ה letterform centered at x=200 -->
  <!-- Top bar -->
  <rect x="172" y="148" width="72" height="11" fill="#2E1A06" rx="1"/>
  <!-- Right bar -->
  <rect x="233" y="148" width="11" height="104" fill="#2E1A06" rx="1"/>
  <!-- Left leg (gap above) -->
  <rect x="172" y="200" width="11" height="52" fill="#2E1A06" rx="1"/>

  <!-- Vortex rings in wake — alternating cream/amber -->
  <ellipse cx="310" cy="165" rx="10" ry="7" fill="none" stroke="#E8A020" stroke-width="1.8" stroke-opacity="0.45"/>
  <ellipse cx="318" cy="198" rx="13" ry="9" fill="none" stroke="#FFF8E7" stroke-width="1.5" stroke-opacity="0.35"/>
  <ellipse cx="310" cy="232" rx="10" ry="7" fill="none" stroke="#E8A020" stroke-width="1.8" stroke-opacity="0.45"/>
  <ellipse cx="340" cy="175" rx="9" ry="6" fill="none" stroke="#FFF8E7" stroke-width="1.5" stroke-opacity="0.30"/>
  <ellipse cx="348" cy="208" rx="11" ry="7" fill="none" stroke="#E8A020" stroke-width="1.5" stroke-opacity="0.38"/>
  <ellipse cx="340" cy="225" rx="9" ry="6" fill="none" stroke="#FFF8E7" stroke-width="1.2" stroke-opacity="0.28"/>
  <ellipse cx="370" cy="185" rx="8" ry="5" fill="none" stroke="#E8A020" stroke-width="1.3" stroke-opacity="0.32"/>
  <ellipse cx="374" cy="215" rx="8" ry="5" fill="none" stroke="#FFF8E7" stroke-width="1.2" stroke-opacity="0.25"/>

  <!-- Vignette -->
  <rect width="400" height="400" fill="url(#vig)"/>
</svg>
