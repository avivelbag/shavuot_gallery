<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0A0A14"/>

  <!-- Background grey bonds (dim) -->
  <!-- Row 0 -->
  <line x1="40" y1="40" x2="90" y2="40" stroke="#333" stroke-width="1.5"/>
  <line x1="140" y1="40" x2="190" y2="40" stroke="#333" stroke-width="1.5"/>
  <line x1="240" y1="40" x2="290" y2="40" stroke="#333" stroke-width="1.5"/>
  <!-- Row 1 -->
  <line x1="40" y1="90" x2="90" y2="90" stroke="#333" stroke-width="1.5"/>
  <line x1="190" y1="90" x2="240" y2="90" stroke="#333" stroke-width="1.5"/>
  <line x1="290" y1="90" x2="340" y2="90" stroke="#333" stroke-width="1.5"/>
  <!-- Row 2 -->
  <line x1="90" y1="140" x2="140" y2="140" stroke="#333" stroke-width="1.5"/>
  <line x1="240" y1="140" x2="290" y2="140" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="140" x2="390" y2="140" stroke="#333" stroke-width="1.5"/>
  <!-- Row 3 -->
  <line x1="40" y1="190" x2="90" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="140" y1="190" x2="190" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="290" y1="190" x2="340" y2="190" stroke="#333" stroke-width="1.5"/>
  <!-- Row 4 -->
  <line x1="90" y1="240" x2="140" y2="240" stroke="#333" stroke-width="1.5"/>
  <line x1="190" y1="240" x2="240" y2="240" stroke="#333" stroke-width="1.5"/>
  <!-- Row 5 -->
  <line x1="40" y1="290" x2="90" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="240" y1="290" x2="290" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="290" x2="390" y2="290" stroke="#333" stroke-width="1.5"/>
  <!-- Row 6 -->
  <line x1="90" y1="340" x2="140" y2="340" stroke="#333" stroke-width="1.5"/>
