  <line x1="390" y1="240" x2="390" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="140" y1="290" x2="140" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="240" y1="290" x2="240" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="340" x2="40" y2="390" stroke="#333" stroke-width="1.5"/>
  <line x1="290" y1="340" x2="290" y2="390" stroke="#333" stroke-width="1.5"/>

  <!-- Gold spanning path: left edge (40,190) -> right edge (390,190) via center -->
