  <line x1="290" y1="390" x2="340" y2="390" stroke="#333" stroke-width="1.5"/>

  <!-- Vertical grey bonds -->
  <line x1="40" y1="40" x2="40" y2="90" stroke="#333" stroke-width="1.5"/>
  <line x1="140" y1="40" x2="140" y2="90" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="40" x2="340" y2="90" stroke="#333" stroke-width="1.5"/>
  <line x1="90" y1="90" x2="90" y2="140" stroke="#333" stroke-width="1.5"/>
  <line x1="390" y1="90" x2="390" y2="140" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="140" x2="40" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="290" y1="140" x2="290" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="190" y1="190" x2="190" y2="240" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="190" x2="340" y2="240" stroke="#333" stroke-width="1.5"/>
