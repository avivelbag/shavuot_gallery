<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#070502"/>

  <!-- GoL grid fragment: 30 cols × 20 rows, cell size 12px, offset (20,80) -->
  <!-- Each cell rect: x = 20 + col*13, y = 80 + row*12, w=11, h=11 -->
  <!-- Dead cells shown as very dark (just background) -->
  <!-- Gold alive cells suggest a Nun (נ) letter partially dissolved -->

  <!-- Nun outline (rows 3-9, cols 8-19): top bar + right wall + scattered dissolution -->

  <!-- Top bar of Nun: row 3, cols 8-18 -->
  <rect x="124" y="116" width="11" height="11" fill="#E8C438"/>
  <rect x="137" y="116" width="11" height="11" fill="#E8C438"/>
  <rect x="150" y="116" width="11" height="11" fill="#E8C438"/>
  <rect x="163" y="116" width="11" height="11" fill="#E8C438"/>
  <rect x="176" y="116" width="11" height="11" fill="#E8C438"/>
  <rect x="189" y="116" width="11" height="11" fill="#E8C438"/>
  <rect x="202" y="116" width="11" height="11" fill="#E8C438"/>
  <rect x="215" y="116" width="11" height="11" fill="#E8C438"/>
  <rect x="228" y="116" width="11" height="11" fill="#E8C438"/>

  <!-- Right wall of Nun: rows 4-8, col 18 — partially dissolved -->
  <rect x="254" y="128" width="11" height="11" fill="#E8C438"/>
  <rect x="254" y="140" width="11" height="11" fill="#E8C438"/>
  <!-- gap (dissolved) at row 6 -->
  <rect x="254" y="164" width="11" height="11" fill="#E8C438"/>
  <rect x="254" y="176" width="11" height="11" fill="#E8C438"/>
  <!-- foot -->
  <rect x="241" y="188" width="11" height="11" fill="#E8C438"/>
  <rect x="254" y="188" width="11" height="11" fill="#E8C438"/>

  <!-- Scattered live cells — glider escaped top-right -->
  <rect x="293" y="92" width="11" height="11" fill="#E8C438"/>
  <rect x="306" y="80" width="11" height="11" fill="#E8C438"/>
  <rect x="319" y="80" width="11" height="11" fill="#E8C438"/>
  <rect x="319" y="92" width="11" height="11" fill="#E8C438"/>
  <rect x="306" y="104" width="11" height="11" fill="#E8C438"/>

  <!-- Isolated still-life block bottom-left -->
  <rect x="46" y="212" width="11" height="11" fill="#E8C438"/>
  <rect x="59" y="212" width="11" height="11" fill="#E8C438"/>
  <rect x="46" y="224" width="11" height="11" fill="#E8C438"/>
  <rect x="59" y="224" width="11" height="11" fill="#E8C438"/>

  <!-- Blinker oscillator (horizontal) bottom-center -->
  <rect x="163" y="248" width="11" height="11" fill="#E8C438"/>
  <rect x="176" y="248" width="11" height="11" fill="#E8C438"/>
  <rect x="189" y="248" width="11" height="11" fill="#E8C438"/>

  <!-- Scattered remnants from the dissolved top-bar left side -->
  <rect x="111" y="140" width="11" height="11" fill="#E8C438" opacity="0.6"/>
  <rect x="98"  y="152" width="11" height="11" fill="#E8C438" opacity="0.5"/>
  <rect x="85"  y="128" width="11" height="11" fill="#E8C438" opacity="0.4"/>

  <!-- A few more scattered cells top area -->
  <rect x="241" y="104" width="11" height="11" fill="#E8C438" opacity="0.7"/>
  <rect x="267" y="116" width="11" height="11" fill="#E8C438" opacity="0.5"/>

  <!-- Grid lines (very subtle) -->
  <!-- (omitted for clean aesthetic) -->

  <!-- Subtle title text -->
  <text x="200" y="370" text-anchor="middle" fill="#E8C438" opacity="0.6"
        font-family="serif" font-size="28" direction="rtl">אנכי</text>
</svg>
