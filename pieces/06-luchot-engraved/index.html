<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engraved in Stone — Luchot HaBrit</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #0e0c08;
      width: 100%; height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg { max-width: 100vw; max-height: 100vh; }

    /*
     * ~8 s alternating pulse: opacity swings from near-zero to ~0.20,
     * evoking the mountain "burning with fire to the very heart of heaven"
     * (Deuteronomy 4:11). No JS required — pure CSS animation.
     */
    @keyframes glow {
      from { opacity: 0.04; }
      to   { opacity: 0.20; }
    }
    .tablet-glow { animation: glow 8s ease-in-out infinite alternate; }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540">
  <defs>
    <!-- Deep-night sky background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080704"/>
      <stop offset="100%" stop-color="#1c1408"/>
    </linearGradient>

    <!-- Cool grey stone: #8a8a8a → #c8c0b0, top-left to bottom-right -->
    <linearGradient id="stone-l" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#c8c0b0"/>
    </linearGradient>
    <linearGradient id="stone-r" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#888080"/>
      <stop offset="100%" stop-color="#c4bca8"/>
    </linearGradient>

    <!--
      Stone texture: fractalNoise drives a displacement map with scale=5,
      producing subtle pixel-level roughness without distorting the tablet
      silhouette beyond recognition.
    -->
    <filter id="stone-tex" x="-5%" y="-5%" width="110%" height="110%"
            color-interpolation-filters="linearRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3"
                    seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!--
      Carved-letter illusion: a dark shadow offset down-right simulates the
      depth of a chisel groove lit from above-left; a faint white highlight
      offset up-left catches the opposite rim of the groove.
    -->
    <filter id="carved" x="-12%" y="-12%" width="124%" height="124%"
            color-interpolation-filters="linearRGB">
      <feOffset in="SourceAlpha" dx="2" dy="3"    result="sa"/>
      <feFlood  flood-color="#180e04" flood-opacity="0.90" result="sc"/>
      <feComposite in="sc" in2="sa" operator="in" result="shadow"/>

      <feOffset in="SourceAlpha" dx="-1" dy="-1.5" result="ha"/>
      <feFlood  flood-color="#ffffff" flood-opacity="0.20" result="hc"/>
      <feComposite in="hc" in2="ha" operator="in" result="hi"/>

      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="hi"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="820" height="540" fill="url(#bg)"/>

  <!-- Ambient ground-fire glow beneath the tablets (Sinai motif) -->
  <ellipse cx="410" cy="540" rx="380" ry="70" fill="#b05010" opacity="0.12"/>

  <!-- ═══════════════════════════════════════════════════
       Left tablet  (arch: 70,60 → 330,60 via apex at 200,60)
       Path: bottom-left up the left side, arc over the top, down the right
       side, close at bottom-right.
       Left edge x=70, right edge x=330, width=260, arch radius=130.
       ═══════════════════════════════════════════════════ -->
  <path d="M 70,515 L 70,190 A 130,130,0,0,1,330,190 L 330,515 Z"
        fill="url(#stone-l)" filter="url(#stone-tex)"/>

  <!-- Amber glow overlay — CSS animation makes it pulse at ~8 s period -->
  <path class="tablet-glow"
        d="M 70,515 L 70,190 A 130,130,0,0,1,330,190 L 330,515 Z"
        fill="#c87820"/>

  <!-- Subtle engraved dividing line below the arch of the left tablet -->
  <line x1="100" y1="204" x2="300" y2="204"
        stroke="#908070" stroke-width="1.2" opacity="0.45"/>

  <!-- Commandments I–V in Hebrew (RTL, near-white, carved filter) -->
  <g font-family="'David','Frank Ruehl','FrankRuehlCLM','Noto Serif Hebrew','Times New Roman',serif"
     font-size="26" fill="#f0ece0" text-anchor="middle"
     direction="rtl" unicode-bidi="bidi-override"
     filter="url(#carved)">
    <text x="200" y="245">אָנֹכִי</text>
    <text x="200" y="299">לֹא יִהְיֶה</text>
    <text x="200" y="353">לֹא תִשָּׂא</text>
    <text x="200" y="407">זָכוֹר</text>
    <text x="200" y="461">כַּבֵּד</text>
  </g>

  <!-- ═══════════════════════════════════════════════════
       Right tablet (arch: 490,60 → 750,60 via apex at 620,60)
       Width=260, arch radius=130.  Gap between tablets: 160 px.
       ═══════════════════════════════════════════════════ -->
  <path d="M 490,515 L 490,190 A 130,130,0,0,1,750,190 L 750,515 Z"
        fill="url(#stone-r)" filter="url(#stone-tex)"/>

  <path class="tablet-glow"
        d="M 490,515 L 490,190 A 130,130,0,0,1,750,190 L 750,515 Z"
        fill="#c87820"/>

  <!-- Subtle engraved dividing line below the arch of the right tablet -->
  <line x1="520" y1="204" x2="720" y2="204"
        stroke="#908070" stroke-width="1.2" opacity="0.45"/>

  <!-- Commandments VI–X in Hebrew -->
  <g font-family="'David','Frank Ruehl','FrankRuehlCLM','Noto Serif Hebrew','Times New Roman',serif"
     font-size="26" fill="#f0ece0" text-anchor="middle"
     direction="rtl" unicode-bidi="bidi-override"
     filter="url(#carved)">
    <text x="620" y="245">לֹא תִרְצָח</text>
    <text x="620" y="299">לֹא תִנְאָף</text>
    <text x="620" y="353">לֹא תִגְנֹב</text>
    <text x="620" y="407">לֹא-תַעֲנֶה</text>
    <text x="620" y="461">לֹא תַחְמֹד</text>
  </g>
</svg>
</body>
</html>
