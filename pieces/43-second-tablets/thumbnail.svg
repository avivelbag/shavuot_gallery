    <line x1="272" y1="214" x2="272" y2="228"/>
    <line x1="272" y1="256" x2="272" y2="270"/>
    <line x1="272" y1="298" x2="272" y2="312"/>
    <line x1="272" y1="340" x2="272" y2="354"/>
    <line x1="300" y1="130" x2="300" y2="158"/>
    <line x1="300" y1="186" x2="300" y2="214"/>
    <line x1="300" y1="242" x2="300" y2="270"/>
    <line x1="300" y1="298" x2="300" y2="326"/>
    <line x1="300" y1="354" x2="300" y2="370"/>
    <line x1="328" y1="130" x2="328" y2="144"/>
    <line x1="328" y1="172" x2="328" y2="186"/>
    <line x1="328" y1="214" x2="328" y2="228"/>
    <line x1="328" y1="256" x2="328" y2="270"/>
