  <!-- Hebrew text -->
  <text x="200" y="395" text-anchor="middle" font-family="Georgia, serif"
        font-size="20" font-weight="bold" fill="#1A3A6B" direction="rtl">כָּרַתִּי אִתְּךָ בְּרִית</text>
</svg>
