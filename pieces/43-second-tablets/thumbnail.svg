    <line x1="128" y1="242" x2="128" y2="270"/>
    <line x1="128" y1="298" x2="128" y2="326"/>
    <line x1="128" y1="354" x2="128" y2="370"/>
    <line x1="156" y1="130" x2="156" y2="144"/>
    <line x1="156" y1="172" x2="156" y2="186"/>
    <line x1="156" y1="214" x2="156" y2="228"/>
    <line x1="156" y1="256" x2="156" y2="270"/>
    <line x1="156" y1="298" x2="156" y2="312"/>
    <line x1="156" y1="340" x2="156" y2="354"/>
