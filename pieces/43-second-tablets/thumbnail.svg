<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F2E8D0"/>

  <!-- Left tablet background -->
  <path d="M 30,130 A 70,70 0 0,1 170,130 L 170,370 L 30,370 Z"
        fill="url(#stoneL)" stroke="#8a7a5a" stroke-width="2.5"/>

  <!-- Right tablet background -->
  <path d="M 230,130 A 70,70 0 0,1 370,130 L 370,370 L 230,370 Z"
        fill="url(#stoneR)" stroke="#8a7a5a" stroke-width="2.5"/>

  <defs>
    <linearGradient id="stoneL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4c8a8"/>
      <stop offset="1" stop-color="#b8ac88"/>
    </linearGradient>
    <linearGradient id="stoneR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4c8a8"/>
      <stop offset="1" stop-color="#b8ac88"/>
    </linearGradient>

    <!-- Clip for left tablet -->
    <clipPath id="clipL">
      <path d="M 30,130 A 70,70 0 0,1 170,130 L 170,370 L 30,370 Z"/>
    </clipPath>
    <!-- Clip for right tablet -->
    <clipPath id="clipR">
      <path d="M 230,130 A 70,70 0 0,1 370,130 L 370,370 L 230,370 Z"/>
    </clipPath>
  </defs>

  <!-- Left tablet knotwork: 5x9 grid of crossings, S=28px, origin (30,130) -->
  <!-- Horizontal strands -->
  <g clip-path="url(#clipL)" stroke="#1A3A6B" stroke-width="9" stroke-linecap="round" fill="none">
    <!-- row 0 -->
    <line x1="30" y1="144" x2="60" y2="144"/>
    <line x1="88" y1="144" x2="116" y2="144"/>
    <line x1="144" y1="144" x2="170" y2="144"/>
    <!-- row 1 -->
    <line x1="30" y1="172" x2="58" y2="172"/>
    <line x1="86" y1="172" x2="114" y2="172"/>
    <line x1="142" y1="172" x2="170" y2="172"/>
    <!-- row 2 -->
    <line x1="30" y1="200" x2="60" y2="200"/>
    <line x1="88" y1="200" x2="116" y2="200"/>
    <line x1="144" y1="200" x2="170" y2="200"/>
    <!-- row 3 -->
    <line x1="30" y1="228" x2="58" y2="228"/>
    <line x1="86" y1="228" x2="114" y2="228"/>
    <line x1="142" y1="228" x2="170" y2="228"/>
    <!-- row 4 -->
    <line x1="30" y1="256" x2="60" y2="256"/>
    <line x1="88" y1="256" x2="116" y2="256"/>
    <line x1="144" y1="256" x2="170" y2="256"/>
    <!-- row 5 -->
    <line x1="30" y1="284" x2="58" y2="284"/>
    <line x1="86" y1="284" x2="114" y2="284"/>
    <line x1="142" y1="284" x2="170" y2="284"/>
    <!-- row 6 -->
    <line x1="30" y1="312" x2="60" y2="312"/>
    <line x1="88" y1="312" x2="116" y2="312"/>
    <line x1="144" y1="312" x2="170" y2="312"/>
    <!-- row 7 -->
    <line x1="30" y1="340" x2="58" y2="340"/>
    <line x1="86" y1="340" x2="114" y2="340"/>
    <line x1="142" y1="340" x2="170" y2="340"/>
    <!-- row 8 -->
    <line x1="30" y1="368" x2="60" y2="368"/>
    <line x1="88" y1="368" x2="116" y2="368"/>
