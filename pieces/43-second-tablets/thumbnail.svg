    <line x1="328" y1="340" x2="328" y2="354"/>
    <line x1="356" y1="130" x2="356" y2="158"/>
    <line x1="356" y1="186" x2="356" y2="214"/>
    <line x1="356" y1="242" x2="356" y2="270"/>
    <line x1="356" y1="298" x2="356" y2="326"/>
    <line x1="356" y1="354" x2="356" y2="370"/>
  </g>
  <g clip-path="url(#clipR)" stroke="#C8A000" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.65">
    <line x1="230" y1="140" x2="260" y2="140"/>
    <line x1="288" y1="140" x2="316" y2="140"/>
    <line x1="344" y1="140" x2="370" y2="140"/>
    <line x1="230" y1="168" x2="258" y2="168"/>
    <line x1="286" y1="168" x2="314" y2="168"/>
    <line x1="342" y1="168" x2="370" y2="168"/>
