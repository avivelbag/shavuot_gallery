    <line x1="230" y1="340" x2="258" y2="340"/>
    <line x1="286" y1="340" x2="314" y2="340"/>
    <line x1="342" y1="340" x2="370" y2="340"/>
    <line x1="230" y1="368" x2="260" y2="368"/>
