<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Milk hexagonal grid pattern (spacing=16, radius=9.24, h=13.86) -->
    <!-- Tile: 48 × 27.72 containing two hex centers at (0,0) and (24,13.86) -->
    <pattern id="milk" x="0" y="0" width="48" height="27.72" patternUnits="userSpaceOnUse">
      <path d="M 9.24,0 L 4.62,8.0 L -4.62,8.0 L -9.24,0 L -4.62,-8.0 L 4.62,-8.0 Z"
            fill="none" stroke="#F5EDD5" stroke-width="0.8"/>
      <path d="M 33.24,13.86 L 28.62,21.86 L 19.38,21.86 L 14.76,13.86 L 19.38,5.86 L 28.62,5.86 Z"
            fill="none" stroke="#F5EDD5" stroke-width="0.8"/>
    </pattern>
    <!-- Honey hexagonal grid pattern (spacing=17.14, radius=9.90, h=14.83) -->
    <!-- Tile: 51.42 × 29.66 containing two hex centers at (0,0) and (25.71,14.83) -->
    <pattern id="honey" x="0" y="0" width="51.42" height="29.66" patternUnits="userSpaceOnUse">
      <path d="M 9.90,0 L 4.95,8.57 L -4.95,8.57 L -9.90,0 L -4.95,-8.57 L 4.95,-8.57 Z"
            fill="none" stroke="#C8920A" stroke-width="0.8"/>
      <path d="M 35.61,14.83 L 30.66,23.40 L 20.76,23.40 L 15.81,14.83 L 20.76,6.26 L 30.66,6.26 Z"
            fill="none" stroke="#C8920A" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Near-black background with warm undertone -->
  <rect width="400" height="400" fill="#080600"/>

  <!-- Milk grid at full extent -->
  <rect width="400" height="400" fill="url(#milk)" opacity="0.85"/>

  <!-- Honey grid rotated 5° about center, oversized to avoid clipping -->
  <g transform="rotate(5, 200, 200)">
    <rect x="-70" y="-70" width="540" height="540" fill="url(#honey)" opacity="0.75"/>
  </g>
</svg>
