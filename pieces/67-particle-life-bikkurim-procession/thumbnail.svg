  <circle cx="185" cy="195" r="4" fill="#3A7040"/>
  <circle cx="200" cy="205" r="4" fill="#3A7040"/>
  <circle cx="215" cy="188" r="4" fill="#3A7040"/>
  <circle cx="192" cy="175" r="3" fill="#3A7040"/>
  <circle cx="220" cy="200" r="3" fill="#3A7040"/>
