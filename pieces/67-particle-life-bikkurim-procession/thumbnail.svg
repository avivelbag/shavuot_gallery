<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A08"/>

  <!-- Motion trail lines (gold pilgrims) -->
