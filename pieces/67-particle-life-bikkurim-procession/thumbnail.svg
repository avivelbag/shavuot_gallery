  <circle cx="105" cy="240" r="3" fill="#C8A020"/>
  <circle cx="120" cy="230" r="3" fill="#C8A020"/>
  <circle cx="72" cy="200" r="3" fill="#C8A020"/>
  <circle cx="125" cy="220" r="3" fill="#C8A020"/>
  <circle cx="60" cy="225" r="3" fill="#C8A020"/>
  <circle cx="130" cy="215" r="3" fill="#C8A020"/>
