<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8e8ff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#8888cc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: near-black #0a0a12 -->
  <rect width="400" height="400" fill="#0a0a12"/>

  <!-- Diffuse glow at centre for fire atmosphere -->
  <ellipse cx="200" cy="200" rx="140" ry="130" fill="url(#glow)" opacity="0.5"/>

  <!-- Aleph letter rendered as bright cellular pixels on dark field -->
  <!-- Right diagonal leg (top-right to bottom-left) -->
  <rect x="228" y="100" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="222" y="108" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="216" y="116" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="210" y="124" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="204" y="132" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="198" y="140" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="192" y="148" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="186" y="156" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="180" y="164" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="174" y="172" width="6" height="6" fill="#e8e8ff" rx="0.5"/>

  <!-- Central horizontal bar -->
  <rect x="176" y="196" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="184" y="196" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="192" y="196" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="200" y="196" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="208" y="196" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="216" y="196" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="224" y="196" width="6" height="6" fill="#e8e8ff" rx="0.5"/>

  <!-- Left diagonal leg (top-left to bottom-right) -->
  <rect x="168" y="216" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="174" y="224" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="180" y="232" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="186" y="240" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="192" y="248" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="198" y="256" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="204" y="264" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="210" y="272" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="216" y="280" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="222" y="288" width="6" height="6" fill="#e8e8ff" rx="0.5"/>
  <rect x="228" y="296" width="6" height="6" fill="#e8e8ff" rx="0.5"/>

  <!-- Yod-like strokes at top and bottom of aleph -->
  <rect x="234" y="90" width="6" height="6" fill="#c8c8ff" rx="0.5"/>
  <rect x="240" y="90" width="6" height="6" fill="#c8c8ff" rx="0.5"/>
  <rect x="246" y="90" width="6" height="6" fill="#b0b0ee" rx="0.5"/>
  <rect x="156" y="298" width="6" height="6" fill="#c8c8ff" rx="0.5"/>
  <rect x="162" y="298" width="6" height="6" fill="#c8c8ff" rx="0.5"/>
  <rect x="168" y="298" width="6" height="6" fill="#b0b0ee" rx="0.5"/>

  <!-- Scattered "fire spread" cells around the letter -->
  <rect x="240" y="116" width="4" height="4" fill="#9090cc" opacity="0.7" rx="0.5"/>
  <rect x="252" y="130" width="3" height="3" fill="#7070aa" opacity="0.5" rx="0.5"/>
  <rect x="160" y="152" width="4" height="4" fill="#9090cc" opacity="0.65" rx="0.5"/>
  <rect x="152" y="168" width="3" height="3" fill="#6060aa" opacity="0.5" rx="0.5"/>
  <rect x="238" y="212" width="4" height="4" fill="#8888bb" opacity="0.6" rx="0.5"/>
  <rect x="246" y="224" width="3" height="3" fill="#6666aa" opacity="0.45" rx="0.5"/>
  <rect x="154" y="278" width="4" height="4" fill="#9090cc" opacity="0.6" rx="0.5"/>
  <rect x="146" y="262" width="3" height="3" fill="#7070aa" opacity="0.4" rx="0.5"/>
  <rect x="200" y="310" width="4" height="4" fill="#7070bb" opacity="0.5" rx="0.5"/>
  <rect x="210" y="318" width="3" height="3" fill="#5050aa" opacity="0.35" rx="0.5"/>
  <rect x="178" y="84" width="4" height="4" fill="#8888cc" opacity="0.55" rx="0.5"/>
  <rect x="170" y="76" width="3" height="3" fill="#6666aa" opacity="0.4" rx="0.5"/>

  <!-- Title bar -->
  <rect x="0" y="355" width="400" height="45" fill="rgba(10,10,18,0.85)"/>
  <text x="200" y="383" font-family="Georgia, serif" font-size="13" fill="#c8c8e8" text-anchor="middle">Black Fire on White Fire</text>
</svg>
