<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0C0902"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
    <linearGradient id="earthGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4A3018"/>
      <stop offset="100%" stop-color="#2A1A08"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#skyGrad)"/>
  <!-- Ground strip -->
  <rect x="0" y="268" width="400" height="32" fill="url(#earthGrad)"/>

  <!-- Wheat stalk (left column) — simplified fractal-like form -->
  <!-- Main stem -->
  <line x1="67" y1="268" x2="64" y2="180" stroke="#C8A035" stroke-width="1.5" opacity="0.85"/>
  <line x1="64" y1="180" x2="60" y2="100" stroke="#C8A035" stroke-width="1.2" opacity="0.80"/>
  <line x1="60" y1="100" x2="58" y2="48"  stroke="#E8C84A" stroke-width="1.0" opacity="0.75"/>
  <!-- Left leaflets wheat -->
  <line x1="64" y1="180" x2="44" y2="160" stroke="#3A6B2A" stroke-width="1.2" opacity="0.70"/>
  <line x1="62" y1="148" x2="42" y2="130" stroke="#3A6B2A" stroke-width="1.0" opacity="0.65"/>
  <line x1="61" y1="118" x2="44" y2="103" stroke="#4A7B3A" stroke-width="0.9" opacity="0.60"/>
  <!-- Right leaflets wheat -->
  <line x1="64" y1="180" x2="82" y2="163" stroke="#3A6B2A" stroke-width="1.2" opacity="0.70"/>
  <line x1="62" y1="150" x2="78" y2="136" stroke="#3A6B2A" stroke-width="1.0" opacity="0.65"/>
  <line x1="61" y1="120" x2="74" y2="108" stroke="#4A7B3A" stroke-width="0.9" opacity="0.60"/>
  <!-- Wheat ear (drooping) -->
  <ellipse cx="54" cy="42" rx="5" ry="12" fill="none" stroke="#E8C84A" stroke-width="1.2"
           opacity="0.85" transform="rotate(-15 54 42)"/>
  <line x1="58" y1="48" x2="54" y2="32" stroke="#E8C84A" stroke-width="1.0" opacity="0.80"/>
  <!-- Secondary branches wheat -->
  <line x1="44" y1="160" x2="34" y2="148" stroke="#3A6B2A" stroke-width="0.7" opacity="0.50"/>
  <line x1="42" y1="130" x2="32" y2="120" stroke="#3A6B2A" stroke-width="0.7" opacity="0.50"/>
  <line x1="82" y1="163" x2="90" y2="150" stroke="#3A6B2A" stroke-width="0.7" opacity="0.50"/>
  <line x1="78" y1="136" x2="86" y2="126" stroke="#3A6B2A" stroke-width="0.7" opacity="0.50"/>

  <!-- Barley frond (center column, denser) -->
  <line x1="200" y1="268" x2="200" y2="185" stroke="#C8A035" stroke-width="1.8" opacity="0.90"/>
  <line x1="200" y1="185" x2="200" y2="100" stroke="#C8A035" stroke-width="1.4" opacity="0.85"/>
  <line x1="200" y1="100" x2="200" y2="40"  stroke="#E8C84A" stroke-width="1.1" opacity="0.80"/>
  <!-- Left leaflets barley (symmetric) -->
  <line x1="200" y1="185" x2="176" y2="166" stroke="#3A6B2A" stroke-width="1.3" opacity="0.72"/>
  <line x1="200" y1="162" x2="178" y2="145" stroke="#3A6B2A" stroke-width="1.1" opacity="0.68"/>
  <line x1="200" y1="140" x2="180" y2="125" stroke="#4A7B3A" stroke-width="0.9" opacity="0.62"/>
  <line x1="200" y1="118" x2="182" y2="106" stroke="#5A8B4A" stroke-width="0.8" opacity="0.55"/>
  <line x1="200" y1="98"  x2="185" y2="88"  stroke="#6A9B5A" stroke-width="0.7" opacity="0.48"/>
  <!-- Right leaflets barley (symmetric) -->
  <line x1="200" y1="185" x2="224" y2="166" stroke="#3A6B2A" stroke-width="1.3" opacity="0.72"/>
  <line x1="200" y1="162" x2="222" y2="145" stroke="#3A6B2A" stroke-width="1.1" opacity="0.68"/>
  <line x1="200" y1="140" x2="220" y2="125" stroke="#4A7B3A" stroke-width="0.9" opacity="0.62"/>
  <line x1="200" y1="118" x2="218" y2="106" stroke="#5A8B4A" stroke-width="0.8" opacity="0.55"/>
  <line x1="200" y1="98"  x2="215" y2="88"  stroke="#6A9B5A" stroke-width="0.7" opacity="0.48"/>
  <!-- Barley head -->
  <ellipse cx="200" cy="32" rx="6" ry="14" fill="none" stroke="#E8C84A" stroke-width="1.3"
           opacity="0.88" filter="url(#glow)"/>
  <line x1="200" y1="40" x2="200" y2="18" stroke="#E8C84A" stroke-width="1.1" opacity="0.85"/>
  <!-- Secondary barley sub-branches -->
  <line x1="176" y1="166" x2="164" y2="155" stroke="#3A6B2A" stroke-width="0.7" opacity="0.45"/>
  <line x1="178" y1="145" x2="166" y2="136" stroke="#3A6B2A" stroke-width="0.6" opacity="0.40"/>
  <line x1="224" y1="166" x2="236" y2="155" stroke="#3A6B2A" stroke-width="0.7" opacity="0.45"/>
  <line x1="222" y1="145" x2="234" y2="136" stroke="#3A6B2A" stroke-width="0.6" opacity="0.40"/>

  <!-- Vine/fig (right column, spreading rounded leaves) -->
  <line x1="333" y1="268" x2="333" y2="195" stroke="#8B5E3C" stroke-width="1.6" opacity="0.80"/>
  <line x1="333" y1="195" x2="332" y2="120" stroke="#3A6B2A" stroke-width="1.2" opacity="0.75"/>
  <line x1="332" y1="120" x2="330" y2="58"  stroke="#3A6B2A" stroke-width="1.0" opacity="0.70"/>
  <!-- Vine leaves (rounded ellipses to suggest broad grape/fig leaves) -->
  <ellipse cx="308" cy="168" rx="16" ry="10" fill="none" stroke="#3A6B2A" stroke-width="1.0"
           opacity="0.68" transform="rotate(-25 308 168)"/>
  <ellipse cx="358" cy="162" rx="15" ry="9"  fill="none" stroke="#3A6B2A" stroke-width="1.0"
           opacity="0.65" transform="rotate(22 358 162)"/>
  <ellipse cx="305" cy="130" rx="13" ry="8"  fill="none" stroke="#4A7B3A" stroke-width="0.9"
           opacity="0.60" transform="rotate(-20 305 130)"/>
  <ellipse cx="356" cy="125" rx="12" ry="8"  fill="none" stroke="#4A7B3A" stroke-width="0.9"
           opacity="0.58" transform="rotate(18 356 125)"/>
  <ellipse cx="310" cy="96"  rx="11" ry="7"  fill="none" stroke="#5A8B4A" stroke-width="0.8"
           opacity="0.52" transform="rotate(-15 310 96)"/>
  <ellipse cx="352" cy="93"  rx="10" ry="6"  fill="none" stroke="#5A8B4A" stroke-width="0.8"
           opacity="0.50" transform="rotate(12 352 93)"/>
  <!-- Vine tendrils -->
  <path d="M332,120 Q318,148 308,168" stroke="#3A6B2A" stroke-width="0.8" fill="none" opacity="0.55"/>
  <path d="M332,120 Q346,145 358,162" stroke="#3A6B2A" stroke-width="0.8" fill="none" opacity="0.55"/>
  <!-- Vine top -->
  <ellipse cx="330" cy="52" rx="9" ry="11" fill="none" stroke="#E8C84A" stroke-width="0.9"
           opacity="0.70" transform="rotate(-8 330 52)"/>

  <!-- Hebrew nun (50) above center plant -->
  <text x="200" y="26" font-family="Georgia,serif" font-size="18"
        fill="rgba(232,200,74,0.42)" text-anchor="middle" direction="rtl">נ</text>

  <!-- Scattered dots suggesting chaos-game point cloud -->
  <circle cx="58" cy="80"  r="0.8" fill="#E8C84A" opacity="0.60"/>
  <circle cx="52" cy="65"  r="0.8" fill="#E8C84A" opacity="0.55"/>
  <circle cx="70" cy="73"  r="0.8" fill="#C8A035" opacity="0.50"/>
  <circle cx="45" cy="90"  r="0.8" fill="#C8A035" opacity="0.45"/>
  <circle cx="198" cy="72" r="0.8" fill="#E8C84A" opacity="0.60"/>
  <circle cx="204" cy="60" r="0.8" fill="#F5EDD8" opacity="0.55"/>
  <circle cx="195" cy="82" r="0.8" fill="#E8C84A" opacity="0.50"/>
  <circle cx="328" cy="78" r="0.8" fill="#C8A035" opacity="0.55"/>
  <circle cx="335" cy="66" r="0.8" fill="#E8C84A" opacity="0.50"/>
</svg>
