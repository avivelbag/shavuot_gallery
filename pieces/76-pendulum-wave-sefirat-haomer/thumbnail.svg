<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0A0A1A"/>

  <!-- Horizontal bar -->
  <line x1="30" y1="40" x2="370" y2="40" stroke="#3a3a6a" stroke-width="2"/>

  <!-- 7 pendulums (one per week) with trails suggesting interference pattern -->

  <!-- Pendulum 1 (violet, week 1, longest) -->
  <g opacity="0.9">
    <polyline points="60,40 58,140 55,200 52,240 50,260 48,270 47,275" stroke="hsl(6,80%,60%)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polyline points="47,275 50,280 55,285 62,278 68,265 64,250 60,230" stroke="hsl(6,80%,60%)" stroke-width="1.5" fill="none" opacity="0.3"/>
    <line x1="60" y1="40" x2="47" y2="275" stroke="hsl(6,80%,60%)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="47" cy="275" r="5" fill="hsl(6,80%,60%)"/>
  </g>

  <!-- Pendulum 2 (red-orange, week 2) -->
  <g opacity="0.9">
    <polyline points="103,40 108,130 115,180 118,210 115,225 110,230 105,228" stroke="hsl(49,80%,60%)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polyline points="105,228 100,222 98,210 103,195 110,188 115,195 112,210" stroke="hsl(49,80%,60%)" stroke-width="1.5" fill="none" opacity="0.3"/>
    <line x1="103" y1="40" x2="105" y2="228" stroke="hsl(49,80%,60%)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="105" cy="228" r="5" fill="hsl(49,80%,60%)"/>
  </g>

  <!-- Pendulum 3 (gold, week 3) -->
  <g opacity="0.9">
    <polyline points="146,40 155,110 162,148 160,168 155,175 148,172 143,165" stroke="hsl(92,80%,60%)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polyline points="143,165 140,155 143,143 150,138 157,143 157,155 152,165" stroke="hsl(92,80%,60%)" stroke-width="1.5" fill="none" opacity="0.3"/>
    <line x1="146" y1="40" x2="143" y2="165" stroke="hsl(92,80%,60%)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="143" cy="165" r="5" fill="hsl(92,80%,60%)"/>
  </g>

  <!-- Pendulum 4 (green-gold, week 4) -->
  <g opacity="0.9">
    <polyline points="189,40 200,95 205,122 200,135 193,138 186,133 183,122" stroke="hsl(135,80%,60%)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polyline points="183,122 183,110 189,103 196,106 201,115 198,128 190,132" stroke="hsl(135,80%,60%)" stroke-width="1.5" fill="none" opacity="0.3"/>
    <line x1="189" y1="40" x2="183" y2="122" stroke="hsl(135,80%,60%)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="183" cy="122" r="5" fill="hsl(135,80%,60%)"/>
  </g>

  <!-- Pendulum 5 (teal, week 5) -->
  <g opacity="0.9">
    <polyline points="232,40 244,80 248,100 244,110 237,112 230,108 228,97" stroke="hsl(178,80%,60%)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polyline points="228,97 229,86 235,80 242,83 246,93 242,105 234,108" stroke="hsl(178,80%,60%)" stroke-width="1.5" fill="none" opacity="0.3"/>
    <line x1="232" y1="40" x2="228" y2="97" stroke="hsl(178,80%,60%)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="228" cy="97" r="5" fill="hsl(178,80%,60%)"/>
  </g>

  <!-- Pendulum 6 (blue, week 6) -->
  <g opacity="0.9">
    <polyline points="275,40 287,68 290,82 286,90 279,91 273,86 272,74" stroke="hsl(220,80%,60%)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polyline points="272,74 273,63 280,58 287,62 290,73 286,84 278,88" stroke="hsl(220,80%,60%)" stroke-width="1.5" fill="none" opacity="0.3"/>
    <line x1="275" y1="40" x2="272" y2="74" stroke="hsl(220,80%,60%)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="272" cy="74" r="5" fill="hsl(220,80%,60%)"/>
  </g>

  <!-- Pendulum 7 (purple, week 7, shortest) -->
  <g opacity="0.9">
    <polyline points="318,40 329,58 332,68 328,74 321,75 315,70 314,60" stroke="hsl(263,80%,60%)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polyline points="314,60 315,50 322,46 329,50 332,60 328,70 320,73" stroke="hsl(263,80%,60%)" stroke-width="1.5" fill="none" opacity="0.3"/>
    <line x1="318" y1="40" x2="314" y2="60" stroke="hsl(263,80%,60%)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="314" cy="60" r="5" fill="hsl(263,80%,60%)"/>
  </g>

  <!-- Decorative arc suggesting fan/interference -->
  <path d="M 47,275 Q 190,320 355,60" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
  <path d="M 55,250 Q 200,290 345,68" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none"/>

  <!-- Label -->
  <text x="200" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F5F0E0" opacity="0.8">Sefirat HaOmer</text>
  <text x="200" y="396" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c8a060" opacity="0.6">שָׁבוּעוֹת</text>
</svg>
