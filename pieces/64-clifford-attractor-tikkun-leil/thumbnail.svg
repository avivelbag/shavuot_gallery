<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="lobe-left" cx="35%" cy="50%" r="30%" fx="35%" fy="50%">
      <stop offset="0%" stop-color="#D4A820" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#4060D0" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#1A1050" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#030510" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lobe-right" cx="65%" cy="50%" r="30%" fx="65%" fy="50%">
      <stop offset="0%" stop-color="#FFF8E0" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#D4A820" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#4060D0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#030510" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#FFF8E0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#030510" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#030510"/>

  <!-- Figure-of-eight lobe clouds -->
