  <ellipse cx="260" cy="200" rx="100" ry="80" fill="url(#lobe-right)" opacity="0.9"/>
  <ellipse cx="200" cy="200" rx="30" ry="24" fill="url(#center-glow)"/>

  <!-- Outer indigo haze -->
