<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Sky gradient background: deep indigo-black at top, dark blue-green at base -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#0d2b1a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#sky)"/>

  <!-- Mountain silhouette: lower third, warm near-black -->
  <polygon points="0,300 200,140 400,300 400,400 0,400" fill="#1a1008"/>

  <!-- === Left slope plants === -->

  <!-- Plant A (t≈0.15 on left slope) — trunk and branches -->
  <line x1="30" y1="277" x2="30" y2="235" stroke="#1a5c2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="258" x2="15" y2="228" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30" y1="258" x2="45" y2="225" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="15" y1="228" x2="8"  y2="208" stroke="#2a8040" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15" y1="228" x2="22" y2="206" stroke="#2a8040" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="45" y1="225" x2="38" y2="205" stroke="#2a8040" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="45" y1="225" x2="54" y2="204" stroke="#2a8040" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="8"  cy="204" r="3" fill="#f5f5e8"/>
  <circle cx="22" cy="202" r="3.5" fill="#c8a8e8"/>
  <circle cx="38" cy="201" r="3" fill="#e8c850"/>
  <circle cx="54" cy="200" r="4" fill="#f5f5e8"/>

  <!-- Plant B (t≈0.32 on left slope) -->
  <line x1="64" y1="252" x2="64" y2="214" stroke="#1a5c2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="232" x2="48" y2="200" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="64" y1="232" x2="80" y2="197" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="48" y1="200" x2="40" y2="180" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="48" y1="200" x2="56" y2="178" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="80" y1="197" x2="73" y2="176" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="80" y1="197" x2="90" y2="175" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <circle cx="40" cy="176" r="3.5" fill="#c8a8e8"/>
  <circle cx="56" cy="174" r="3" fill="#e8c850"/>
  <circle cx="73" cy="172" r="4" fill="#f5f5e8"/>
  <circle cx="90" cy="171" r="3" fill="#c8a8e8"/>

  <!-- Plant C (t≈0.52 on left slope) — taller, near centre -->
  <line x1="104" y1="222" x2="106" y2="180" stroke="#1a5c2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="200" x2="88"  y2="168" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="105" y1="200" x2="122" y2="165" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="88"  y1="168" x2="80"  y2="148" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="88"  y1="168" x2="96"  y2="146" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="122" y1="165" x2="115" y2="144" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="122" y1="165" x2="132" y2="142" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <circle cx="80"  cy="144" r="3.5" fill="#e8c850"/>
  <circle cx="96"  cy="142" r="4"   fill="#f5f5e8"/>
  <circle cx="115" cy="140" r="3"   fill="#c8a8e8"/>
  <circle cx="132" cy="138" r="4.5" fill="#f5f5e8"/>

  <!-- === Right slope plants === -->

  <!-- Plant D (t≈0.30 on right slope) -->
  <line x1="260" y1="224" x2="258" y2="182" stroke="#1a5c2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="259" y1="202" x2="244" y2="170" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="259" y1="202" x2="274" y2="167" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="244" y1="170" x2="236" y2="150" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="244" y1="170" x2="252" y2="148" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="274" y1="167" x2="267" y2="146" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="274" y1="167" x2="284" y2="144" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <circle cx="236" cy="146" r="3"   fill="#f5f5e8"/>
  <circle cx="252" cy="144" r="4"   fill="#e8c850"/>
  <circle cx="267" cy="142" r="3.5" fill="#c8a8e8"/>
  <circle cx="284" cy="140" r="3"   fill="#f5f5e8"/>

  <!-- Plant E (t≈0.52 on right slope) -->
  <line x1="304" y1="248" x2="304" y2="208" stroke="#1a5c2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="304" y1="228" x2="288" y2="196" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="304" y1="228" x2="320" y2="193" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="288" y1="196" x2="280" y2="176" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="288" y1="196" x2="296" y2="174" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="320" y1="193" x2="313" y2="172" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="320" y1="193" x2="330" y2="170" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <circle cx="280" cy="172" r="4"   fill="#c8a8e8"/>
  <circle cx="296" cy="170" r="3"   fill="#f5f5e8"/>
  <circle cx="313" cy="168" r="3.5" fill="#e8c850"/>
  <circle cx="330" cy="166" r="3"   fill="#f5f5e8"/>

  <!-- Plant F (t≈0.72 on right slope) -->
  <line x1="344" y1="268" x2="344" y2="228" stroke="#1a5c2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="344" y1="248" x2="328" y2="218" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="344" y1="248" x2="360" y2="215" stroke="#1a5c2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="328" y1="218" x2="320" y2="198" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="328" y1="218" x2="336" y2="196" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="360" y1="215" x2="353" y2="194" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="360" y1="215" x2="370" y2="192" stroke="#2a8040" stroke-width="1.1" stroke-linecap="round"/>
  <circle cx="320" cy="194" r="3.5" fill="#e8c850"/>
  <circle cx="336" cy="192" r="4"   fill="#f5f5e8"/>
  <circle cx="353" cy="190" r="3"   fill="#c8a8e8"/>
  <circle cx="370" cy="188" r="3"   fill="#f5f5e8"/>

  <!-- Plant G (t≈0.85 on right slope) -->
  <line x1="370" y1="282" x2="370" y2="244" stroke="#1a5c2a" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="370" y1="260" x2="355" y2="234" stroke="#2a8040" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="370" y1="260" x2="384" y2="231" stroke="#2a8040" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="355" cy="230" r="3" fill="#c8a8e8"/>
  <circle cx="384" cy="227" r="3" fill="#f5f5e8"/>

  <!-- === Lightning bolts from top of canvas to mountain peak === -->
  <polyline points="175,0 168,28 180,55 160,82 172,108 162,140" stroke="#e8f0ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <polyline points="220,0 214,22 228,50 218,75 230,100 222,120 200,140" stroke="#e8f0ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.75"/>

  <!-- Peak glow -->
  <circle cx="200" cy="140" r="18" fill="rgba(200,220,255,0.12)"/>

  <!-- Title label -->
  <rect x="0" y="360" width="400" height="40" fill="rgba(10,5,32,0.72)"/>
  <text x="200" y="386" font-family="Georgia, serif" font-size="13" fill="#e8d8b0" text-anchor="middle">The Mountain in Bloom</text>
</svg>
