<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="cloudGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="0.85"/>
      <stop offset="30%"  stop-color="#FF8C00" stop-opacity="0.70"/>
      <stop offset="65%"  stop-color="#e8e2d8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0D0A1A" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="cloudBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5f0e8" stop-opacity="0.9"/>
      <stop offset="55%"  stop-color="#c8c2b8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6a6680" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="blur1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="300" fill="#0D0A1A"/>

  <!-- Mountain silhouette -->
  <path d="M0,300 L0,210 Q40,190 80,200 Q120,210 160,175 Q200,140 230,170
           Q260,200 290,185 Q320,170 360,195 Q385,205 400,200 L400,300 Z"
        fill="#18102a"/>

  <!-- Cloud glow halo -->
  <ellipse cx="200" cy="130" rx="170" ry="90" fill="url(#cloudGlow)" filter="url(#blur2)"/>

  <!-- Cloud body billows -->
  <ellipse cx="200" cy="120" rx="145" ry="72" fill="url(#cloudBody)" filter="url(#blur1)" opacity="0.9"/>
  <ellipse cx="140" cy="105" rx="80"  ry="48" fill="#dedad2" filter="url(#blur1)" opacity="0.65"/>
  <ellipse cx="265" cy="110" rx="75"  ry="44" fill="#d8d4cc" filter="url(#blur1)" opacity="0.60"/>
  <ellipse cx="200" cy="90"  rx="95"  ry="38" fill="#f0ece4" filter="url(#blur1)" opacity="0.55"/>

  <!-- Inner fire glow -->
  <ellipse cx="200" cy="125" rx="85" ry="48" fill="#FF8C00" filter="url(#blur2)" opacity="0.35"/>
  <ellipse cx="200" cy="120" rx="50" ry="30" fill="#FFD700" filter="url(#blur2)" opacity="0.30"/>
</svg>
