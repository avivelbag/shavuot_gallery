<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="nightDawn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#0a0a2e"/>
      <stop offset="25%"  stop-color="#2d0a5c"/>
      <stop offset="50%"  stop-color="#1a1a8c"/>
      <stop offset="75%"  stop-color="#8899cc"/>
      <stop offset="100%" stop-color="#f0e8b0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%"   stop-color="#8899cc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a2e"/>

  <!-- Soft central glow -->
  <ellipse cx="200" cy="180" rx="160" ry="130" fill="url(#glow)"/>

  <!-- Toroidal orbit traces — outer ring, from bottom (dark) to top (pale gold) -->
  <!-- Each path is an arc at a different torus height, colored accordingly -->

  <!-- Deep bottom: midnight blue arcs (z ≈ -1 region) -->
  <ellipse cx="200" cy="290" rx="118" ry="28" fill="none"
    stroke="#0a0a2e" stroke-width="2.5" opacity="0.9"/>
  <ellipse cx="200" cy="285" rx="110" ry="24" fill="none"
    stroke="#14123a" stroke-width="1.5" opacity="0.7"/>

  <!-- Lower orbit traces: dark blue-violet -->
  <ellipse cx="200" cy="268" rx="118" ry="30" fill="none"
    stroke="#1a0d4a" stroke-width="1.8" opacity="0.85"/>
  <ellipse cx="200" cy="258" rx="120" ry="32" fill="none"
    stroke="#200f56" stroke-width="1.4" opacity="0.75"/>
  <ellipse cx="200" cy="245" rx="119" ry="32" fill="none"
    stroke="#2d0a5c" stroke-width="1.4" opacity="0.8"/>

  <!-- Mid orbit traces: deep violet to cobalt -->
  <ellipse cx="200" cy="232" rx="116" ry="31" fill="none"
    stroke="#321070" stroke-width="1.3" opacity="0.75"/>
  <ellipse cx="200" cy="218" rx="112" ry="30" fill="none"
    stroke="#26248a" stroke-width="1.3" opacity="0.75"/>
  <ellipse cx="200" cy="204" rx="108" ry="29" fill="none"
    stroke="#1a1a8c" stroke-width="1.5" opacity="0.8"/>
  <ellipse cx="200" cy="190" rx="104" ry="28" fill="none"
    stroke="#2a2a9c" stroke-width="1.3" opacity="0.7"/>

  <!-- Upper orbit traces: cobalt to silver-blue -->
  <ellipse cx="200" cy="176" rx="100" ry="26" fill="none"
    stroke="#4455a8" stroke-width="1.4" opacity="0.75"/>
  <ellipse cx="200" cy="162" rx="94" ry="25" fill="none"
    stroke="#6677b8" stroke-width="1.4" opacity="0.78"/>
  <ellipse cx="200" cy="148" rx="88" ry="23" fill="none"
    stroke="#8899cc" stroke-width="1.6" opacity="0.82"/>
  <ellipse cx="200" cy="134" rx="80" ry="21" fill="none"
    stroke="#99aad8" stroke-width="1.5" opacity="0.78"/>

  <!-- Top orbit traces: silver-blue to pale gold — the dawn region -->
  <ellipse cx="200" cy="120" rx="70" ry="18" fill="none"
    stroke="#b0bde0" stroke-width="1.6" opacity="0.82"/>
  <ellipse cx="200" cy="107" rx="58" ry="15" fill="none"
    stroke="#ccd4e8" stroke-width="1.7" opacity="0.85"/>
  <ellipse cx="200" cy="95" rx="44" ry="12" fill="none"
    stroke="#e0dbc4" stroke-width="1.8" opacity="0.88"/>
  <ellipse cx="200" cy="85" rx="30" ry="9" fill="none"
    stroke="#f0e8b0" stroke-width="2.0" opacity="0.92"/>
  <ellipse cx="200" cy="78" rx="18" ry="6" fill="none"
    stroke="#f0e8b0" stroke-width="2.2" opacity="0.95"/>

  <!-- Central axis glow — pale gold dot at top of torus -->
  <circle cx="200" cy="76" r="4" fill="#f0e8b0" opacity="0.7"/>
  <circle cx="200" cy="76" r="10" fill="#f0e8b0" opacity="0.12"/>

  <!-- Vertical "connecting" traces suggesting the toroidal spiral -->
  <path d="M82,290 C68,240 70,180 130,78" fill="none"
    stroke="url(#nightDawn)" stroke-width="0.9" opacity="0.5"/>
  <path d="M318,290 C332,240 330,180 270,78" fill="none"
    stroke="url(#nightDawn)" stroke-width="0.9" opacity="0.5"/>
  <path d="M90,270 C80,220 88,170 152,88" fill="none"
    stroke="url(#nightDawn)" stroke-width="0.7" opacity="0.35"/>
  <path d="M310,270 C320,220 312,170 248,88" fill="none"
    stroke="url(#nightDawn)" stroke-width="0.7" opacity="0.35"/>

  <!-- Bottom label: Hebrew text in pale gold -->
  <text x="200" y="375"
    font-family="'Noto Serif Hebrew', 'Times New Roman', serif"
    font-size="18"
    font-style="italic"
    text-anchor="middle"
    fill="#f0e8b0"
    opacity="0.88"
    direction="rtl">תיקון ליל שבועות</text>
</svg>
