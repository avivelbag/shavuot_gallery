<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0d0d1a"/>

  <!-- Faint centerline -->
  <line x1="0" y1="240" x2="400" y2="240" stroke="#d4a017" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Harmonic 1 overlay — 2 cycles, amplitude ~41px -->
  <path d="M 0,240 C 36,199 64,199 100,240 C 136,281 164,281 200,240 C 236,199 264,199 300,240 C 336,281 364,281 400,240"
        stroke="#d4a017" stroke-opacity="0.22" stroke-width="1" fill="none"/>

  <!-- Harmonic 2 overlay — 4 cycles, amplitude ~20px -->
  <path d="M 0,240 C 18,220 32,220 50,240 C 68,260 82,260 100,240 C 118,220 132,220 150,240 C 168,260 182,260 200,240 C 218,220 232,220 250,240 C 268,260 282,260 300,240 C 318,220 332,220 350,240 C 368,260 382,260 400,240"
        stroke="#d4a017" stroke-opacity="0.18" stroke-width="1" fill="none"/>

  <!-- Harmonic 3 overlay — 6 cycles, amplitude ~13px -->
  <path d="M 0,240 C 12,227 22,227 33,240 C 44,253 54,253 67,240 C 78,227 88,227 100,240 C 112,253 122,253 133,240 C 144,227 154,227 167,240 C 178,253 188,253 200,240 C 212,227 222,227 233,240 C 244,253 254,253 267,240 C 278,227 288,227 300,240 C 312,253 322,253 333,240 C 344,227 354,227 367,240 C 378,253 388,253 400,240"
        stroke="#d4a017" stroke-opacity="0.15" stroke-width="1" fill="none"/>

  <!--
    Composite waveform — sum of 3 harmonics with 1/k weights at peak amplitude.
    Key points computed from: y = 240 - 75*(A1*sin(2πf·x/400) + A2*sin(4πf·x/400) + A3*sin(6πf·x/400))
    with f=2 cycles, A1=0.546, A2=0.273, A3=0.182 (normalized 1/k weights).
    The waveform has a narrow, sharp positive peak and a broader, shallower trough —
    characteristic of an overtone series converging toward a sawtooth shape.
  -->
  <path d="M 0,240 L 20,184 L 25,181 L 40,197 L 60,226 L 80,227 L 100,240 L 120,260 L 140,259 L 160,283 L 175,299 L 180,297 L 200,240 L 220,184 L 225,181 L 240,197 L 260,226 L 280,227 L 300,240 L 320,260 L 340,259 L 360,283 L 375,299 L 380,297 L 400,240"
        stroke="#f0ece0" stroke-width="3" fill="none" filter="url(#glow)"/>

  <!-- Hebrew title — right-to-left, gold -->
  <text x="200" y="46" font-family="serif" font-size="18" fill="#d4a017"
        text-anchor="middle" direction="rtl">וְקוֹל הַשּׁוֹפָר</text>
  <text x="200" y="70" font-family="serif" font-size="16" fill="#d4a017"
        text-anchor="middle" direction="rtl">הוֹלֵךְ וְחָזֵק מְאֹד</text>

  <!-- Subtitle -->
  <text x="200" y="370" font-family="serif" font-size="11" fill="#5a5a8a"
        text-anchor="middle">Exodus 19:19 — Shavuot Gallery</text>
</svg>
