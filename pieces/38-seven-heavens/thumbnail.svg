<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A0830"/>
      <stop offset="14%"  stop-color="#221048"/>
      <stop offset="28%"  stop-color="#1A2840"/>
      <stop offset="42%"  stop-color="#1A3028"/>
      <stop offset="56%"  stop-color="#2A3018"/>
      <stop offset="70%"  stop-color="#3A2808"/>
      <stop offset="84%"  stop-color="#2A1204"/>
      <stop offset="100%" stop-color="#0E0400"/>
    </linearGradient>
    <radialGradient id="peak-glow" cx="50%" cy="55%" r="18%">
      <stop offset="0%"   stop-color="#FFD060" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#FF8820" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: seven layered heaven bands -->
  <rect width="300" height="200" fill="url(#sky-grad)"/>

  <!-- Subtle band dividers -->
  <line x1="0" y1="29"  x2="300" y2="29"  stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="58"  x2="300" y2="58"  stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="87"  x2="300" y2="87"  stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="116" x2="300" y2="116" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="145" x2="300" y2="145" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="166" x2="300" y2="166" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Stars in upper region -->
  <g fill="white" opacity="0.7">
    <circle cx="30"  cy="15" r="1.0"/><circle cx="75"  cy="8"  r="1.5"/>
    <circle cx="125" cy="18" r="0.8"/><circle cx="170" cy="6"  r="1.2"/>
    <circle cx="220" cy="14" r="1.0"/><circle cx="265" cy="9"  r="1.5"/>
    <circle cx="50"  cy="38" r="0.8"/><circle cx="100" cy="44" r="1.0"/>
    <circle cx="150" cy="32" r="1.3"/><circle cx="200" cy="40" r="0.8"/>
    <circle cx="250" cy="35" r="1.0"/>
  </g>

  <!-- Tetragrammaton hint in top band -->
  <text x="150" y="22" font-family="Georgia, serif" font-size="10"
        fill="white" fill-opacity="0.18" text-anchor="middle" letter-spacing="2">יהוה</text>

  <!-- Golden peak glow -->
  <ellipse cx="150" cy="110" rx="38" ry="24" fill="url(#peak-glow)"/>

  <!-- Har Sinai silhouette -->
  <path d="M 0,200 L 0,178 L 52,148 L 88,112 L 120,88 L 150,76 L 180,88 L 212,112 L 248,148 L 300,178 L 300,200 Z"
        fill="#0D0518" fill-opacity="0.95"/>

  <!-- Curtain lines (Vilon) -->
  <g stroke="#C8A8E0" stroke-width="0.7" fill="none" opacity="0.18">
    <path d="M 0,164 Q 50,160 100,166 Q 150,172 200,166 Q 250,160 300,164"/>
    <path d="M 0,172 Q 50,168 100,174 Q 150,180 200,174 Q 250,168 300,172"/>
  </g>

  <!-- Title text -->
  <text x="150" y="193" font-family="Georgia, serif" font-size="8"
        fill="rgba(200,180,240,0.6)" text-anchor="middle" letter-spacing="0.5">
    Through Seven Heavens
  </text>
</svg>
