<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#080d1a"/>

  <!-- Outer scattered particles -->
  <circle cx="58"  cy="82"  r="1.5" fill="#e8c060" opacity="0.32"/>
  <circle cx="340" cy="74"  r="1.5" fill="#e8c060" opacity="0.28"/>
  <circle cx="358" cy="310" r="1.5" fill="#e8c060" opacity="0.30"/>
  <circle cx="44"  cy="318" r="1.8" fill="#e8c060" opacity="0.27"/>
  <circle cx="372" cy="190" r="1.4" fill="#e8c060" opacity="0.33"/>
  <circle cx="28"  cy="210" r="1.4" fill="#e8c060" opacity="0.29"/>
  <circle cx="186" cy="22"  r="1.5" fill="#e8c060" opacity="0.31"/>
  <circle cx="210" cy="378" r="1.8" fill="#e8c060" opacity="0.28"/>
  <circle cx="120" cy="46"  r="1.4" fill="#e8c060" opacity="0.25"/>
  <circle cx="282" cy="354" r="1.5" fill="#e8c060" opacity="0.26"/>
  <circle cx="360" cy="140" r="1.4" fill="#e8c060" opacity="0.30"/>
  <circle cx="38"  cy="155" r="1.4" fill="#e8c060" opacity="0.28"/>

  <!-- Mid-range particles -->
  <circle cx="106" cy="110" r="2.0" fill="#e8c060" opacity="0.55" filter="url(#dotglow)"/>
  <circle cx="298" cy="105" r="2.2" fill="#e8c060" opacity="0.60" filter="url(#dotglow)"/>
  <circle cx="318" cy="210" r="1.8" fill="#e8c060" opacity="0.50"/>
  <circle cx="305" cy="282" r="2.0" fill="#e8c060" opacity="0.52" filter="url(#dotglow)"/>
  <circle cx="96"  cy="288" r="1.8" fill="#e8c060" opacity="0.55"/>
  <circle cx="82"  cy="192" r="2.0" fill="#e8c060" opacity="0.58" filter="url(#dotglow)"/>
  <circle cx="200" cy="78"  r="1.8" fill="#e8c060" opacity="0.55"/>
  <circle cx="200" cy="322" r="2.0" fill="#e8c060" opacity="0.50"/>
  <circle cx="148" cy="92"  r="1.6" fill="#e8c060" opacity="0.48"/>
  <circle cx="258" cy="315" r="1.8" fill="#e8c060" opacity="0.46"/>

  <!-- Inner particles close to letter outline -->
  <circle cx="155" cy="148" r="2.5" fill="#e8c060" opacity="0.82" filter="url(#dotglow)"/>
  <circle cx="246" cy="152" r="2.2" fill="#e8c060" opacity="0.78"/>
  <circle cx="200" cy="135" r="2.5" fill="#e8c060" opacity="0.90" filter="url(#dotglow)"/>
  <circle cx="262" cy="190" r="2.2" fill="#e8c060" opacity="0.72"/>
  <circle cx="142" cy="208" r="2.5" fill="#e8c060" opacity="0.85" filter="url(#dotglow)"/>
  <circle cx="158" cy="265" r="2.2" fill="#e8c060" opacity="0.80"/>
  <circle cx="232" cy="272" r="2.5" fill="#e8c060" opacity="0.75" filter="url(#dotglow)"/>
  <circle cx="268" cy="234" r="2.0" fill="#e8c060" opacity="0.70"/>
  <circle cx="198" cy="288" r="2.2" fill="#e8c060" opacity="0.76" filter="url(#dotglow)"/>
  <circle cx="174" cy="178" r="2.0" fill="#e8c060" opacity="0.88"/>
  <circle cx="228" cy="218" r="2.5" fill="#e8c060" opacity="0.82" filter="url(#dotglow)"/>

  <!-- Main letter alef with glow -->
  <text x="200" y="278"
        text-anchor="middle"
        font-family="David, serif"
        font-size="200"
        fill="#e8c060"
        opacity="0.92"
        filter="url(#glow)">א</text>
</svg>
