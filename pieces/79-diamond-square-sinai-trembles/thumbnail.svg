<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0d0a12"/>

  <!-- Isometric grid of rhombus cells, 6×6, suggesting the mountain heightmap -->
  <!-- Each rhombus: cell width=44, cell height=22, half=22/11 -->
  <!-- Origin center: 200, 260 -->
  <!-- sx = (ix-iy)*22 + 200, sy = (ix+iy)*11 - h*55 + 260 -->

  <!-- Row s=0: ix=0,iy=0 h=0.2 (base) -->
  <polygon points="200,249 222,260 244,249 222,238" fill="#2A1A2E"/>
  <polygon points="200,249 222,260 222,271 200,260" fill="#1e1222"/>
  <polygon points="222,260 244,249 244,260 222,271" fill="#160d18"/>

  <!-- Row s=1: ix=0,iy=1 h=0.25 -->
  <polygon points="178,260 200,271 222,260 200,249" fill="#2A1A2E"/>
  <polygon points="178,260 200,271 200,282 178,271" fill="#1e1222"/>
  <polygon points="200,271 222,260 222,271 200,282" fill="#160d18"/>

  <!-- ix=1,iy=0 h=0.3 -->
  <polygon points="222,249 244,260 266,249 244,238" fill="#3D2B1A"/>
  <polygon points="222,249 244,260 244,271 222,260" fill="#2b1e12"/>
  <polygon points="244,260 266,249 266,260 244,271" fill="#1f160d"/>

  <!-- Row s=2: ix=0,iy=2 h=0.2 -->
  <polygon points="156,271 178,282 200,271 178,260" fill="#2A1A2E"/>
  <polygon points="156,271 178,282 178,293 156,282" fill="#1e1222"/>
  <polygon points="178,282 200,271 200,282 178,293" fill="#160d18"/>

  <!-- ix=1,iy=1 h=0.45 -->
  <polygon points="200,255 222,266 244,255 222,244" fill="#3D2B1A"/>
  <polygon points="200,255 222,266 222,277 200,266" fill="#2b1e12"/>
  <polygon points="222,266 244,255 244,266 222,277" fill="#1f160d"/>

  <!-- ix=2,iy=0 h=0.35 -->
  <polygon points="244,249 266,260 288,249 266,238" fill="#3D2B1A"/>
  <polygon points="244,249 266,260 266,271 244,260" fill="#2b1e12"/>
  <polygon points="266,260 288,249 288,260 266,271" fill="#1f160d"/>

  <!-- Row s=3: ix=1,iy=2 h=0.6 -->
  <polygon points="178,249 200,260 222,249 200,238" fill="#7A5A38"/>
  <polygon points="178,249 200,260 200,271 178,260" fill="#563f28"/>
  <polygon points="200,260 222,249 222,260 200,271" fill="#3d2d1c"/>

  <!-- ix=2,iy=1 h=0.65 -->
  <polygon points="222,244 244,255 266,244 244,233" fill="#7A5A38"/>
  <polygon points="222,244 244,255 244,266 222,255" fill="#563f28"/>
  <polygon points="244,255 266,244 266,255 244,266" fill="#3d2d1c"/>

  <!-- ix=3,iy=0 h=0.4 -->
  <polygon points="266,249 288,260 310,249 288,238" fill="#3D2B1A"/>
  <polygon points="266,249 288,260 288,271 266,260" fill="#2b1e12"/>
  <polygon points="288,260 310,249 310,260 288,271" fill="#1f160d"/>

  <!-- Row s=4: ix=2,iy=2 h=0.8 -->
  <polygon points="200,233 222,244 244,233 222,222" fill="#B89070"/>
  <polygon points="200,233 222,244 222,255 200,244" fill="#82664e"/>
  <polygon points="222,244 244,233 244,244 222,255" fill="#5c4838"/>

  <!-- ix=3,iy=1 h=0.7 -->
  <polygon points="244,238 266,249 288,238 266,227" fill="#7A5A38"/>
  <polygon points="244,238 266,249 266,260 244,249" fill="#563f28"/>
  <polygon points="266,249 288,238 288,249 266,260" fill="#3d2d1c"/>

  <!-- ix=4,iy=0 h=0.3 -->
  <polygon points="288,249 310,260 332,249 310,238" fill="#2A1A2E"/>
  <polygon points="288,249 310,260 310,271 288,260" fill="#1e1222"/>
  <polygon points="310,260 332,249 332,260 310,271" fill="#160d18"/>

  <!-- Row s=5: ix=3,iy=2 h=0.92 (summit) -->
  <polygon points="222,216 244,227 266,216 244,205" fill="#F0E8D8"/>
  <polygon points="222,216 244,227 244,238 222,227" fill="#a89880"/>
  <polygon points="244,227 266,216 266,227 244,238" fill="#786858"/>

  <!-- ix=4,iy=1 h=0.78 -->
  <polygon points="266,227 288,238 310,227 288,216" fill="#B89070"/>
  <polygon points="266,227 288,238 288,249 266,238" fill="#82664e"/>
  <polygon points="288,238 310,227 310,238 288,249" fill="#5c4838"/>

  <!-- ix=5,iy=0 h=0.2 -->
  <polygon points="310,249 332,260 354,249 332,238" fill="#2A1A2E"/>
  <polygon points="310,249 332,260 332,271 310,260" fill="#1e1222"/>
  <polygon points="332,260 354,249 354,260 332,271" fill="#160d18"/>

  <!-- ix=4,iy=2 h=0.88 (upper slope) -->
  <polygon points="244,210 266,221 288,210 266,199" fill="#B89070"/>
  <polygon points="244,210 266,221 266,232 244,221" fill="#82664e"/>
  <polygon points="266,221 288,210 288,221 266,232" fill="#5c4838"/>

  <!-- ix=5,iy=1 h=0.5 -->
  <polygon points="288,227 310,238 332,227 310,216" fill="#3D2B1A"/>
  <polygon points="288,227 310,238 310,249 288,238" fill="#2b1e12"/>
  <polygon points="310,238 332,227 332,238 310,249" fill="#1f160d"/>

  <!-- ix=5,iy=2 h=0.6 -->
  <polygon points="266,210 288,221 310,210 288,199" fill="#7A5A38"/>
  <polygon points="266,210 288,221 288,232 266,221" fill="#563f28"/>
  <polygon points="288,221 310,210 310,221 288,232" fill="#3d2d1c"/>

  <!-- Faint smoke lines above summit cells -->
  <line x1="222" y1="216" x2="218" y2="190" stroke="#C0B8A8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="244" y1="205" x2="244" y2="178" stroke="#C0B8A8" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="266" y1="210" x2="263" y2="183" stroke="#C0B8A8" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="244" y1="178" x2="240" y2="158" stroke="#C0B8A8" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="244" y1="158" x2="246" y2="140" stroke="#C0B8A8" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Red-orange fire glow along base -->
  <rect x="100" y="295" width="200" height="12" fill="url(#fireGlow)" opacity="0.6"/>
  <defs>
    <linearGradient id="fireGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4010" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF4010" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
