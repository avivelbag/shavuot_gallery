<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .rings-left  { mix-blend-mode: screen; }
      .rings-right { mix-blend-mode: screen; }
    </style>
    <!-- Clipping rect so rings don't bleed outside canvas -->
    <clipPath id="clip">
      <rect width="400" height="400"/>
    </clipPath>
  </defs>

  <!-- Background: deep linen #2C1810 -->
  <rect width="400" height="400" fill="#2C1810"/>

  <!-- Source 1 (left, x=140) — concentric rings in wheat gold / warm amber.
       Rings alternate between filled colour and dark to simulate wave crests. -->
  <g class="rings-left" clip-path="url(#clip)" opacity="0.72">
    <circle cx="140" cy="200" r="175" fill="#A0622A" opacity="0.35"/>
    <circle cx="140" cy="200" r="155" fill="#2C1810"/>
    <circle cx="140" cy="200" r="135" fill="#D4A843" opacity="0.52"/>
    <circle cx="140" cy="200" r="115" fill="#2C1810"/>
    <circle cx="140" cy="200" r="95"  fill="#D4A843" opacity="0.58"/>
    <circle cx="140" cy="200" r="75"  fill="#2C1810"/>
    <circle cx="140" cy="200" r="55"  fill="#D4A843" opacity="0.65"/>
    <circle cx="140" cy="200" r="35"  fill="#2C1810"/>
    <circle cx="140" cy="200" r="18"  fill="#F5E6C8" opacity="0.85"/>
    <circle cx="140" cy="200" r="6"   fill="#2C1810"/>
  </g>

  <!-- Source 2 (right, x=260) — same ring pattern, screen-blended.
       Where both sources have bright rings the combined result is brighter,
       approximating constructive interference. -->
  <g class="rings-right" clip-path="url(#clip)" opacity="0.72">
    <circle cx="260" cy="200" r="175" fill="#A0622A" opacity="0.35"/>
    <circle cx="260" cy="200" r="155" fill="#2C1810"/>
    <circle cx="260" cy="200" r="135" fill="#D4A843" opacity="0.52"/>
    <circle cx="260" cy="200" r="115" fill="#2C1810"/>
    <circle cx="260" cy="200" r="95"  fill="#D4A843" opacity="0.58"/>
    <circle cx="260" cy="200" r="75"  fill="#2C1810"/>
    <circle cx="260" cy="200" r="55"  fill="#D4A843" opacity="0.65"/>
    <circle cx="260" cy="200" r="35"  fill="#2C1810"/>
    <circle cx="260" cy="200" r="18"  fill="#F5E6C8" opacity="0.85"/>
    <circle cx="260" cy="200" r="6"   fill="#2C1810"/>
  </g>

  <!-- Bread loaf marker — Source 1 -->
  <ellipse cx="140" cy="200" rx="18" ry="11" fill="#D4A843" stroke="#2C1810" stroke-width="1.5"/>
  <line x1="133" y1="193" x2="133" y2="207" stroke="#2C1810" stroke-width="0.9" opacity="0.6"/>
  <line x1="140" y1="191" x2="140" y2="209" stroke="#2C1810" stroke-width="0.9" opacity="0.6"/>
  <line x1="147" y1="193" x2="147" y2="207" stroke="#2C1810" stroke-width="0.9" opacity="0.6"/>

  <!-- Bread loaf marker — Source 2 -->
  <ellipse cx="260" cy="200" rx="18" ry="11" fill="#D4A843" stroke="#2C1810" stroke-width="1.5"/>
  <line x1="253" y1="193" x2="253" y2="207" stroke="#2C1810" stroke-width="0.9" opacity="0.6"/>
  <line x1="260" y1="191" x2="260" y2="209" stroke="#2C1810" stroke-width="0.9" opacity="0.6"/>
  <line x1="267" y1="193" x2="267" y2="207" stroke="#2C1810" stroke-width="0.9" opacity="0.6"/>

  <!-- Title label bar -->
  <rect x="0" y="362" width="400" height="38" fill="rgba(44,24,16,0.78)"/>
  <text x="200" y="387" font-family="Georgia, serif" font-size="12" fill="#F5E6C8" text-anchor="middle">Shtei HaLechem — Two Loaves as Wave Interference</text>
</svg>
