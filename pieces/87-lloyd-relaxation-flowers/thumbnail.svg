      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F4B8C1" opacity="0.92" transform="rotate(180)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F4B8C1" opacity="0.92" transform="rotate(225)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F4B8C1" opacity="0.92" transform="rotate(270)"/>
