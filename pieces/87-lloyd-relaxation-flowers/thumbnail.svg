      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F5E642" opacity="0.92" transform="rotate(51.4)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F5E642" opacity="0.92" transform="rotate(102.9)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F5E642" opacity="0.92" transform="rotate(154.3)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F5E642" opacity="0.92" transform="rotate(205.7)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F5E642" opacity="0.92" transform="rotate(257.1)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#F5E642" opacity="0.92" transform="rotate(308.6)"/>
