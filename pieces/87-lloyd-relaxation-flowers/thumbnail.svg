      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#A8C4E0" opacity="0.92" transform="rotate(120)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#A8C4E0" opacity="0.92" transform="rotate(180)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#A8C4E0" opacity="0.92" transform="rotate(240)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#A8C4E0" opacity="0.92" transform="rotate(300)"/>
      <circle cx="0" cy="0" r="3.6" fill="#5080B0"/>
