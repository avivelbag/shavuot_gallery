  <use href="#f1" transform="translate(110,40)"/>
  <use href="#f2" transform="translate(180,40)"/>
  <use href="#f3" transform="translate(250,40)"/>
  <use href="#f4" transform="translate(320,40)"/>
  <use href="#f0" transform="translate(385,40)"/>
  <!-- Row 1 y=110 -->
  <use href="#f1" transform="translate(75,110)"/>
  <use href="#f2" transform="translate(145,110)"/>
  <use href="#f3" transform="translate(215,110)"/>
  <use href="#f4" transform="translate(285,110)"/>
  <use href="#f0" transform="translate(355,110)"/>
  <!-- Row 2 y=180 -->
  <use href="#f2" transform="translate(40,180)"/>
  <use href="#f3" transform="translate(110,180)"/>
  <use href="#f4" transform="translate(180,180)"/>
  <use href="#f0" transform="translate(250,180)"/>
  <use href="#f1" transform="translate(320,180)"/>
  <use href="#f2" transform="translate(385,180)"/>
  <!-- Row 3 y=250 -->
  <use href="#f3" transform="translate(75,250)"/>
  <use href="#f4" transform="translate(145,250)"/>
  <use href="#f0" transform="translate(215,250)"/>
  <use href="#f1" transform="translate(285,250)"/>
  <use href="#f2" transform="translate(355,250)"/>
  <!-- Row 4 y=320 -->
  <use href="#f4" transform="translate(40,320)"/>
  <use href="#f0" transform="translate(110,320)"/>
  <use href="#f1" transform="translate(180,320)"/>
  <use href="#f2" transform="translate(250,320)"/>
  <use href="#f3" transform="translate(320,320)"/>
  <use href="#f4" transform="translate(385,320)"/>
  <!-- Row 5 y=385 -->
  <use href="#f0" transform="translate(75,385)"/>
  <use href="#f1" transform="translate(145,385)"/>
  <use href="#f2" transform="translate(215,385)"/>
  <use href="#f3" transform="translate(285,385)"/>
  <use href="#f4" transform="translate(355,385)"/>
</svg>
