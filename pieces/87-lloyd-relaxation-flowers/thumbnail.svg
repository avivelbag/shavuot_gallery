<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1A2E1A"/>
  <defs>
    <!-- White anemone: petals #FAFAF2, center #FFE066 -->
    <g id="f0">
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#FAFAF2" opacity="0.92"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#FAFAF2" opacity="0.92" transform="rotate(60)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#FAFAF2" opacity="0.92" transform="rotate(120)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#FAFAF2" opacity="0.92" transform="rotate(180)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#FAFAF2" opacity="0.92" transform="rotate(240)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#FAFAF2" opacity="0.92" transform="rotate(300)"/>
      <circle cx="0" cy="0" r="3.6" fill="#FFE066"/>
    </g>
    <!-- Purple iris: petals #7B5EA7, center #FFD700 -->
    <g id="f1">
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#7B5EA7" opacity="0.92"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#7B5EA7" opacity="0.92" transform="rotate(60)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#7B5EA7" opacity="0.92" transform="rotate(120)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#7B5EA7" opacity="0.92" transform="rotate(180)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#7B5EA7" opacity="0.92" transform="rotate(240)"/>
      <ellipse cx="11" cy="0" rx="6.3" ry="3.2" fill="#7B5EA7" opacity="0.92" transform="rotate(300)"/>
      <circle cx="0" cy="0" r="3.6" fill="#FFD700"/>
    </g>
    <!-- Soft pink rose: petals #F4B8C1, center #C06080 -->
    <g id="f2">
