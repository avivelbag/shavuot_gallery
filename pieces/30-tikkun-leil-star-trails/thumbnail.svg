<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c1a"/>
      <stop offset="45%"  stop-color="#1a0e45"/>
      <stop offset="75%"  stop-color="#5a1e54"/>
      <stop offset="90%"  stop-color="#c85020"/>
      <stop offset="100%" stop-color="#e8a830"/>
    </linearGradient>
    <radialGradient id="poleGlow" cx="46%" cy="28%" r="6%">
      <stop offset="0%"   stop-color="#d0dcff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d0dcff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c0ccff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c0ccff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="300" fill="url(#sky)"/>

  <!-- Star trail arcs (hand-placed arcs suggesting rotation) -->
  <g stroke="#c8d4ff" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M 184,84 A 15,15 0 0,1 199,72"  stroke-width="1.5" opacity="0.9"/>
    <path d="M 152,106 A 55,55 0 0,1 178,70" stroke-width="1.2" opacity="0.75"/>
    <path d="M 240,95  A 60,60 0 0,1 208,58" stroke-width="1.2" opacity="0.7"/>
    <path d="M 110,130 A 95,95 0 0,1 155,64" stroke-width="1.0" opacity="0.6"/>
    <path d="M 280,118 A 90,90 0 0,1 238,52" stroke-width="1.0" opacity="0.6"/>
    <path d="M 80,155  A 130,130 0 0,1 138,56" stroke-width="0.8" opacity="0.5"/>
    <path d="M 310,140 A 125,125 0 0,1 258,46" stroke-width="0.8" opacity="0.5"/>
    <path d="M 50,180  A 165,165 0 0,1 120,46" stroke-width="0.7" opacity="0.4"/>
    <path d="M 340,165 A 160,160 0 0,1 278,40" stroke-width="0.7" opacity="0.4"/>
  </g>

  <!-- Scattered star points -->
  <g fill="#d8e0ff" opacity="0.8">
    <circle cx="199" cy="84" r="2.5"/>
    <circle cx="178" cy="71" r="1.8"/>
    <circle cx="241" cy="96"  r="1.6"/>
    <circle cx="110" cy="131" r="1.4"/>
    <circle cx="280" cy="118" r="1.5"/>
    <circle cx="80"  cy="155" r="1.2"/>
    <circle cx="310" cy="140" r="1.3"/>
    <circle cx="155" cy="107" r="1.4"/>
    <circle cx="220" cy="78"  r="1.2"/>
    <circle cx="330" cy="100" r="1.1"/>
    <circle cx="60"  cy="120" r="1.0"/>
    <circle cx="355" cy="130" r="1.0"/>
    <circle cx="95"  cy="100" r="0.9"/>
    <circle cx="260" cy="140" r="1.1"/>
    <circle cx="140" cy="160" r="1.0"/>
  </g>

  <!-- Pole star glow -->
  <circle cx="184" cy="84" r="24" fill="url(#poleGlow)"/>
  <circle cx="184" cy="84" r="3"  fill="#ffffff" opacity="0.95"/>

  <!-- Hill silhouette -->
  <path d="M0,250 Q40,220 80,240 Q120,200 160,235 Q200,220 240,232 Q280,210 320,228 Q360,218 400,230 L400,300 L0,300 Z"
        fill="#04070e"/>

  <!-- Lit windows -->
  <g fill="rgba(255,200,80,0.82)">
    <rect x="58"  y="245" width="7" height="11"/>
    <rect x="71"  y="245" width="7" height="11"/>
    <rect x="221" y="237" width="6" height="10"/>
    <rect x="312" y="240" width="6" height="11"/>
    <rect x="323" y="240" width="6" height="11"/>
  </g>

  <!-- Window glows -->
  <circle cx="62"  cy="251" r="12" fill="rgba(255,190,60,0.15)"/>
  <circle cx="74"  cy="251" r="12" fill="rgba(255,190,60,0.15)"/>
  <circle cx="224" cy="242" r="10" fill="rgba(255,190,60,0.13)"/>
  <circle cx="315" cy="246" r="11" fill="rgba(255,190,60,0.13)"/>
  <circle cx="326" cy="246" r="11" fill="rgba(255,190,60,0.13)"/>

  <!-- Hebrew phrase -->
  <text x="200" y="284" text-anchor="middle" font-family="serif"
        font-size="13" fill="rgba(232,210,130,0.75)"
        letter-spacing="2" direction="rtl">עַד-עֲלוֹת הַשַּׁחַר</text>
</svg>
