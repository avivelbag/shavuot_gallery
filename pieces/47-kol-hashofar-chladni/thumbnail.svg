<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0A0804"/>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Chladni nodal lines approximating mode (1,2): diagonals + corner hyperbolas -->
  <g filter="url(#glow)" stroke="#E8C870" stroke-width="1.8" fill="none" opacity="0.85">
    <!-- Main diagonal nodal lines -->
    <line x1="10" y1="10" x2="390" y2="390"/>
    <line x1="390" y1="10" x2="10" y2="390"/>
    <!-- Corner hyperbola accents -->
    <path d="M10,120 Q80,10 180,10"/>
    <path d="M220,10 Q320,10 390,120"/>
    <path d="M10,280 Q80,390 180,390"/>
    <path d="M220,390 Q320,390 390,280"/>
    <!-- Inner ring -->
    <path d="M110,200 Q200,110 290,200 Q200,290 110,200"/>
    <!-- Fine nodal detail -->
    <circle cx="200" cy="200" r="8" fill="#E8C870" stroke="none" opacity="0.6"/>
    <circle cx="80" cy="80" r="4" fill="#E8C870" stroke="none" opacity="0.4"/>
    <circle cx="320" cy="80" r="4" fill="#E8C870" stroke="none" opacity="0.4"/>
    <circle cx="80" cy="320" r="4" fill="#E8C870" stroke="none" opacity="0.4"/>
    <circle cx="320" cy="320" r="4" fill="#E8C870" stroke="none" opacity="0.4"/>
    <!-- Outer boundary suggestion -->
    <rect x="15" y="15" width="370" height="370" stroke-width="1" opacity="0.25"/>
  </g>
</svg>
