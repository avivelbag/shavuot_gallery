<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0A2E"/>
      <stop offset="100%" stop-color="#060612"/>
    </radialGradient>
    <radialGradient id="gv" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A1A8A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1A0035" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="gg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C445" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C8A435" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="gw" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDF0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C8A435" stop-opacity="0.2"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Spiral arm 1 — Ben Azzai (right, violet) -->
  <circle cx="276" cy="200" r="56" fill="url(#gv)" opacity="0.85"/>
  <circle cx="314" cy="200" r="28" fill="#2A0055" opacity="0.7"/>
  <circle cx="332" cy="200" r="14" fill="#3A0070" opacity="0.6"/>
  <circle cx="341" cy="200" r="7" fill="#4A0090" opacity="0.5"/>
  <circle cx="345" cy="200" r="3.5" fill="#FFFDF0" opacity="0.4"/>
  <circle cx="347" cy="200" r="1.8" fill="#FFFDF0" opacity="0.3"/>

  <!-- Spiral arm 2 — Ben Zoma (left, midnight blue) -->
  <circle cx="124" cy="200" r="56" fill="#0A0A2E" opacity="0.85"/>
  <circle cx="86" cy="200" r="28" fill="#1A1A4E" opacity="0.7"/>
  <circle cx="68" cy="200" r="14" fill="#2A2A6E" opacity="0.6"/>
  <circle cx="59" cy="200" r="7" fill="#3A3A8E" opacity="0.5"/>
  <circle cx="55" cy="200" r="3.5" fill="#FFFDF0" opacity="0.4"/>
  <circle cx="53" cy="200" r="1.8" fill="#FFFDF0" opacity="0.3"/>

  <!-- Spiral arm 3 — Acher (bottom, gold) -->
  <circle cx="200" cy="276" r="56" fill="url(#gg)" opacity="0.85"/>
  <circle cx="200" cy="314" r="28" fill="#8A6500" opacity="0.7"/>
  <circle cx="200" cy="332" r="14" fill="#C8A435" opacity="0.6"/>
  <circle cx="200" cy="341" r="7" fill="#E8C445" opacity="0.5"/>
  <circle cx="200" cy="345" r="3.5" fill="#FFFDF0" opacity="0.4"/>
  <circle cx="200" cy="347" r="1.8" fill="#FFFDF0" opacity="0.3"/>

  <!-- Spiral arm 4 — Rabbi Akiva (top, white-hot) -->
  <circle cx="200" cy="124" r="56" fill="#1A0A3A" opacity="0.85"/>
  <circle cx="200" cy="86" r="28" fill="#2A1A5A" opacity="0.7"/>
  <circle cx="200" cy="68" r="14" fill="#C8A435" opacity="0.6"/>
  <circle cx="200" cy="59" r="7" fill="#E8D890" opacity="0.5"/>
  <circle cx="200" cy="55" r="3.5" fill="#FFFDF0" opacity="0.45"/>
  <circle cx="200" cy="53" r="1.8" fill="#FFFDF0" opacity="0.4"/>

  <!-- Nested inter-arm circles (cross-nestings) -->
  <circle cx="248" cy="152" r="22" fill="#2A0055" opacity="0.45"/>
  <circle cx="152" cy="152" r="22" fill="#0A1A4E" opacity="0.45"/>
  <circle cx="152" cy="248" r="22" fill="#6A4500" opacity="0.45"/>
  <circle cx="248" cy="248" r="22" fill="#1A0035" opacity="0.45"/>

  <circle cx="262" cy="138" r="11" fill="#C8A435" opacity="0.3"/>
  <circle cx="138" cy="138" r="11" fill="#2A2A6E" opacity="0.3"/>
  <circle cx="138" cy="262" r="11" fill="#C8A435" opacity="0.3"/>
  <circle cx="262" cy="262" r="11" fill="#4A1A8A" opacity="0.3"/>

  <!-- Central generating circles (kissing arrangement) -->
  <circle cx="200" cy="200" r="34" fill="none" stroke="#C8A435" stroke-width="0.8" opacity="0.5"/>
  <circle cx="200" cy="200" r="18" fill="#060612" opacity="0.9"/>
  <circle cx="200" cy="200" r="8" fill="#1A0035" opacity="0.8"/>
  <circle cx="200" cy="200" r="3" fill="#C8A435" opacity="0.7"/>

  <!-- Hebrew sage labels in corners -->
  <text x="24" y="36" font-family="serif" font-size="13" fill="#C8A435" opacity="0.85" text-anchor="start">בן עזאי</text>
  <text x="376" y="36" font-family="serif" font-size="13" fill="#6A6AAE" opacity="0.85" text-anchor="end">בן זומא</text>
  <text x="24" y="390" font-family="serif" font-size="13" fill="#C8A435" opacity="0.85" text-anchor="start">אחר</text>
  <text x="376" y="390" font-family="serif" font-size="13" fill="#FFFDF0" opacity="0.9" text-anchor="end">עקיבא</text>

  <!-- Fractal dust dots near limit set -->
  <circle cx="356" cy="196" r="0.9" fill="#FFFDF0" opacity="0.7"/>
  <circle cx="358" cy="202" r="0.7" fill="#FFFDF0" opacity="0.6"/>
  <circle cx="354" cy="205" r="0.5" fill="#FFFDF0" opacity="0.5"/>
  <circle cx="44" cy="196" r="0.9" fill="#FFFDF0" opacity="0.7"/>
  <circle cx="42" cy="202" r="0.7" fill="#FFFDF0" opacity="0.6"/>
  <circle cx="46" cy="205" r="0.5" fill="#FFFDF0" opacity="0.5"/>
  <circle cx="196" cy="356" r="0.9" fill="#FFFDF0" opacity="0.7"/>
  <circle cx="202" cy="358" r="0.7" fill="#FFFDF0" opacity="0.6"/>
  <circle cx="205" cy="354" r="0.5" fill="#FFFDF0" opacity="0.5"/>
  <circle cx="196" cy="44" r="0.9" fill="#FFFDF0" opacity="0.7"/>
  <circle cx="202" cy="42" r="0.7" fill="#FFFDF0" opacity="0.6"/>
  <circle cx="205" cy="46" r="0.5" fill="#FFFDF0" opacity="0.5"/>
</svg>
