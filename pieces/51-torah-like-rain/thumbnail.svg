<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#050A12"/>
  <!-- Falling Hebrew letters as rain drops -->
  <text x="60"  y="40"  font-family="serif" font-size="22" fill="#FFF8E7" opacity="0.9" text-anchor="middle">מ</text>
  <text x="130" y="70"  font-family="serif" font-size="18" fill="#FFF8E7" opacity="0.85" text-anchor="middle">ת</text>
  <text x="200" y="30"  font-family="serif" font-size="26" fill="#FFF8E7" opacity="0.95" text-anchor="middle">ר</text>
  <text x="270" y="55"  font-family="serif" font-size="20" fill="#FFF8E7" opacity="0.8" text-anchor="middle">א</text>
  <text x="340" y="45"  font-family="serif" font-size="16" fill="#FFF8E7" opacity="0.75" text-anchor="middle">ש</text>
  <text x="90"  y="110" font-family="serif" font-size="24" fill="#FFF8E7" opacity="0.9" text-anchor="middle">ה</text>
  <text x="160" y="130" font-family="serif" font-size="18" fill="#FFF8E7" opacity="0.7" text-anchor="middle">ל</text>
  <text x="310" y="100" font-family="serif" font-size="22" fill="#FFF8E7" opacity="0.85" text-anchor="middle">כ</text>
  <text x="50"  y="170" font-family="serif" font-size="19" fill="#FFF8E7" opacity="0.88" text-anchor="middle">י</text>
  <text x="240" y="150" font-family="serif" font-size="23" fill="#FFF8E7" opacity="0.8" text-anchor="middle">ד</text>
  <!-- Ground line ripples -->
  <line x1="0" x2="400" y1="255" y2="255" stroke="#1a3050" stroke-width="1" opacity="0.5"/>
  <!-- Ripple circles -->
  <circle cx="60"  cy="255" r="18" fill="none" stroke="rgba(212,168,48,0.45)" stroke-width="1.5"/>
  <circle cx="60"  cy="255" r="32" fill="none" stroke="rgba(212,168,48,0.25)" stroke-width="1"/>
  <circle cx="200" cy="255" r="22" fill="none" stroke="rgba(212,168,48,0.5)"  stroke-width="1.5"/>
  <circle cx="200" cy="255" r="40" fill="none" stroke="rgba(212,168,48,0.2)"  stroke-width="1"/>
  <circle cx="320" cy="255" r="15" fill="none" stroke="rgba(212,168,48,0.4)"  stroke-width="1.5"/>
  <circle cx="320" cy="255" r="28" fill="none" stroke="rgba(212,168,48,0.18)" stroke-width="1"/>
  <!-- Pooled settled letters -->
  <text x="60"  y="275" font-family="serif" font-size="13" fill="rgba(255,248,231,0.25)" text-anchor="middle">מ</text>
  <text x="130" y="272" font-family="serif" font-size="13" fill="rgba(255,248,231,0.25)" text-anchor="middle">ת</text>
  <text x="200" y="276" font-family="serif" font-size="13" fill="rgba(255,248,231,0.25)" text-anchor="middle">ר</text>
  <text x="270" y="273" font-family="serif" font-size="13" fill="rgba(255,248,231,0.25)" text-anchor="middle">א</text>
  <text x="320" y="275" font-family="serif" font-size="13" fill="rgba(255,248,231,0.25)" text-anchor="middle">ש</text>
</svg>
