<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="srcGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40FF80" stop-opacity="1"/>
      <stop offset="100%" stop-color="#40FF80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dstGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: deep indigo -->
  <rect width="400" height="400" fill="#090818"/>

  <!-- Faint violet trail network converging left-to-right -->
  <!-- Upper cluster of faint paths -->
  <polyline points="36,200 55,185 80,170 105,180 130,165 160,172 190,160 220,168 250,155 280,165 310,172 340,180 364,200"
    stroke="#3020A0" stroke-width="1.2" fill="none" opacity="0.45"/>
  <polyline points="36,200 60,210 85,220 110,215 135,225 165,218 195,228 225,220 255,230 285,222 315,215 345,208 364,200"
    stroke="#3020A0" stroke-width="1.2" fill="none" opacity="0.45"/>
  <polyline points="36,200 58,195 83,178 108,188 133,175 163,182 193,168 223,175 253,162 283,172 313,178 343,185 364,200"
    stroke="#3020A0" stroke-width="1" fill="none" opacity="0.3"/>
  <polyline points="36,200 62,215 87,225 112,220 137,232 167,225 197,235 227,228 257,238 287,232 317,226 347,212 364,200"
    stroke="#3020A0" stroke-width="1" fill="none" opacity="0.3"/>
  <polyline points="36,200 65,190 90,205 115,195 140,210 170,200 200,215 230,205 260,218 290,208 320,200 350,195 364,200"
    stroke="#4030B0" stroke-width="0.8" fill="none" opacity="0.25"/>
  <polyline points="36,200 65,210 90,195 115,205 140,190 170,200 200,185 230,195 260,180 290,192 320,200 350,205 364,200"
    stroke="#4030B0" stroke-width="0.8" fill="none" opacity="0.25"/>
  <!-- More diffuse trails -->
  <polyline points="36,200 70,155 110,145 150,158 200,142 250,152 300,148 364,200"
    stroke="#3020A0" stroke-width="0.7" fill="none" opacity="0.18"/>
  <polyline points="36,200 70,245 110,255 150,242 200,258 250,248 300,252 364,200"
    stroke="#3020A0" stroke-width="0.7" fill="none" opacity="0.18"/>
  <polyline points="36,200 55,165 90,148 140,162 190,150 240,158 290,155 340,172 364,200"
    stroke="#2818A0" stroke-width="0.6" fill="none" opacity="0.15"/>
  <polyline points="36,200 55,235 90,252 140,238 190,250 240,242 290,245 340,228 364,200"
    stroke="#2818A0" stroke-width="0.6" fill="none" opacity="0.15"/>

  <!-- Bright gold path cutting through center -->
  <polyline points="36,200 65,198 95,202 125,198 155,200 185,199 215,201 245,199 275,200 305,200 335,200 364,200"
    stroke="#F0C040" stroke-width="3.5" fill="none" filter="url(#goldGlow)" opacity="0.95"/>

  <!-- Source node glow (left, green) -->
  <circle cx="36" cy="200" r="18" fill="url(#srcGlow)" opacity="0.7"/>
  <circle cx="36" cy="200" r="6" fill="#40FF80" opacity="0.9"/>

  <!-- Destination node glow (right, white star) -->
  <circle cx="364" cy="200" r="22" fill="url(#dstGlow)" opacity="0.65"/>
  <circle cx="364" cy="200" r="7" fill="#FFFFFF" opacity="0.95"/>

  <!-- Hebrew letter נ (nun = 50 = Shavuot) in faint gold, upper right -->
  <text x="360" y="38" font-family="serif" font-size="32" fill="#F0C040"
    opacity="0.55" text-anchor="end" dominant-baseline="auto">נ</text>
</svg>
