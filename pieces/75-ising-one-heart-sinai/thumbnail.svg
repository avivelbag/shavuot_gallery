<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <style>
      .g { fill: #E8C438; }
      .b { fill: #1A3068; }
    </style>
  </defs>
  <rect width="400" height="400" fill="#1A3068"/>

  <!-- Ising lattice near the critical point — fractal-looking domains of gold on blue.
       Hand-placed 8×8 px cells in a 50×50 grid approximating critical fluctuations at T≈2.3.
       Pattern designed to show characteristic fractal domain structure. -->

  <!-- Row 0 (y=0..7) -->
  <rect class="g" x="0"   y="0"  width="8" height="8"/>
  <rect class="g" x="8"   y="0"  width="8" height="8"/>
  <rect class="b" x="16"  y="0"  width="8" height="8"/>
  <rect class="g" x="24"  y="0"  width="8" height="8"/>
  <rect class="g" x="32"  y="0"  width="8" height="8"/>
  <rect class="b" x="40"  y="0"  width="8" height="8"/>
  <rect class="b" x="48"  y="0"  width="8" height="8"/>
  <rect class="g" x="56"  y="0"  width="8" height="8"/>
  <rect class="b" x="64"  y="0"  width="8" height="8"/>
  <rect class="g" x="72"  y="0"  width="8" height="8"/>
  <rect class="g" x="80"  y="0"  width="8" height="8"/>
  <rect class="g" x="88"  y="0"  width="8" height="8"/>
  <rect class="b" x="96"  y="0"  width="8" height="8"/>
  <rect class="b" x="104" y="0"  width="8" height="8"/>
  <rect class="b" x="112" y="0"  width="8" height="8"/>
  <rect class="g" x="120" y="0"  width="8" height="8"/>
  <rect class="g" x="128" y="0"  width="8" height="8"/>
  <rect class="b" x="136" y="0"  width="8" height="8"/>
  <rect class="g" x="144" y="0"  width="8" height="8"/>
  <rect class="b" x="152" y="0"  width="8" height="8"/>
  <rect class="b" x="160" y="0"  width="8" height="8"/>
  <rect class="g" x="168" y="0"  width="8" height="8"/>
  <rect class="b" x="176" y="0"  width="8" height="8"/>
  <rect class="b" x="184" y="0"  width="8" height="8"/>
  <rect class="g" x="192" y="0"  width="8" height="8"/>
  <rect class="g" x="200" y="0"  width="8" height="8"/>
  <rect class="b" x="208" y="0"  width="8" height="8"/>
  <rect class="g" x="216" y="0"  width="8" height="8"/>
  <rect class="b" x="224" y="0"  width="8" height="8"/>
  <rect class="b" x="232" y="0"  width="8" height="8"/>
  <rect class="b" x="240" y="0"  width="8" height="8"/>
  <rect class="g" x="248" y="0"  width="8" height="8"/>
  <rect class="g" x="256" y="0"  width="8" height="8"/>
  <rect class="b" x="264" y="0"  width="8" height="8"/>
  <rect class="g" x="272" y="0"  width="8" height="8"/>
  <rect class="g" x="280" y="0"  width="8" height="8"/>
  <rect class="b" x="288" y="0"  width="8" height="8"/>
  <rect class="g" x="296" y="0"  width="8" height="8"/>
  <rect class="b" x="304" y="0"  width="8" height="8"/>
  <rect class="b" x="312" y="0"  width="8" height="8"/>
  <rect class="g" x="320" y="0"  width="8" height="8"/>
  <rect class="b" x="328" y="0"  width="8" height="8"/>
  <rect class="g" x="336" y="0"  width="8" height="8"/>
  <rect class="g" x="344" y="0"  width="8" height="8"/>
  <rect class="b" x="352" y="0"  width="8" height="8"/>
  <rect class="g" x="360" y="0"  width="8" height="8"/>
  <rect class="b" x="368" y="0"  width="8" height="8"/>
  <rect class="b" x="376" y="0"  width="8" height="8"/>
  <rect class="g" x="384" y="0"  width="8" height="8"/>
  <rect class="g" x="392" y="0"  width="8" height="8"/>

  <!-- Rows 1-49 generated as correlated fractal-like domains.
       The pattern simulates spin clusters near the critical point:
       large connected patches of same color, with irregular boundaries. -->

  <!-- Large gold domain — upper-left quadrant -->
  <rect class="g" x="0"   y="8"  width="40" height="32"/>
  <rect class="g" x="0"   y="40" width="24" height="24"/>
  <rect class="b" x="24"  y="40" width="16" height="16"/>
  <rect class="g" x="40"  y="8"  width="16" height="24"/>
  <rect class="b" x="40"  y="32" width="8"  height="16"/>
  <rect class="g" x="48"  y="8"  width="8"  height="40"/>

  <!-- Blue domain cluster — center-left -->
  <rect class="b" x="56"  y="0"  width="48" height="48"/>
  <rect class="g" x="64"  y="16" width="16" height="16"/>
  <rect class="g" x="80"  y="8"  width="8"  height="8"/>
  <rect class="b" x="56"  y="48" width="24" height="32"/>
  <rect class="g" x="80"  y="48" width="24" height="16"/>

  <!-- Gold domain — upper-right region -->
  <rect class="g" x="104" y="0"  width="56" height="56"/>
  <rect class="b" x="112" y="8"  width="16" height="16"/>
  <rect class="b" x="136" y="24" width="8"  height="24"/>
  <rect class="g" x="104" y="56" width="24" height="24"/>
  <rect class="b" x="128" y="56" width="32" height="16"/>

  <!-- Mixed area — center -->
  <rect class="b" x="160" y="0"  width="32" height="32"/>
  <rect class="g" x="168" y="8"  width="16" height="16"/>
  <rect class="g" x="160" y="32" width="16" height="32"/>
  <rect class="b" x="176" y="32" width="16" height="24"/>
  <rect class="g" x="176" y="56" width="16" height="8"/>

  <!-- Large blue domain — right side upper -->
  <rect class="b" x="192" y="0"  width="64" height="64"/>
  <rect class="g" x="200" y="16" width="24" height="24"/>
  <rect class="g" x="232" y="8"  width="16" height="16"/>
  <rect class="b" x="216" y="48" width="16" height="16"/>

  <!-- Gold patch far right upper -->
  <rect class="g" x="256" y="0"  width="48" height="48"/>
  <rect class="b" x="272" y="8"  width="16" height="24"/>
  <rect class="g" x="256" y="48" width="16" height="16"/>
  <rect class="b" x="272" y="48" width="32" height="16"/>

  <!-- Mixed right edge -->
  <rect class="b" x="304" y="0"  width="32" height="32"/>
  <rect class="g" x="312" y="8"  width="16" height="16"/>
  <rect class="g" x="304" y="32" width="24" height="32"/>
  <rect class="b" x="328" y="32" width="8"  height="16"/>

  <!-- Far right column -->
  <rect class="g" x="336" y="0"  width="32" height="48"/>
  <rect class="b" x="352" y="16" width="16" height="24"/>
  <rect class="b" x="336" y="48" width="16" height="16"/>
  <rect class="g" x="352" y="48" width="16" height="16"/>
  <rect class="g" x="368" y="0"  width="32" height="32"/>
  <rect class="b" x="376" y="8"  width="16" height="16"/>
  <rect class="b" x="368" y="32" width="32" height="32"/>
  <rect class="g" x="380" y="40" width="12" height="16"/>

  <!-- Lower half — larger domains (approaching more ordered state) -->
  <!-- Big gold domain lower-left -->
  <rect class="g" x="0"   y="64" width="80" height="80"/>
  <rect class="b" x="16"  y="80" width="24" height="24"/>
  <rect class="b" x="48"  y="96" width="16" height="16"/>
  <rect class="g" x="0"   y="144" width="48" height="48"/>
  <rect class="b" x="48"  y="144" width="32" height="24"/>
  <rect class="g" x="48"  y="168" width="16" height="24"/>
  <rect class="b" x="64"  y="168" width="16" height="24"/>

  <!-- Blue cluster lower-left-center -->
  <rect class="b" x="80"  y="64" width="48" height="64"/>
  <rect class="g" x="88"  y="80" width="16" height="32"/>
  <rect class="g" x="112" y="72" width="16" height="16"/>
  <rect class="b" x="80"  y="128" width="24" height="40"/>
  <rect class="g" x="104" y="128" width="24" height="24"/>
  <rect class="b" x="104" y="152" width="16" height="16"/>

  <!-- Large gold center -->
  <rect class="g" x="128" y="64"  width="96" height="96"/>
  <rect class="b" x="144" y="80"  width="32" height="32"/>
  <rect class="b" x="184" y="96"  width="24" height="24"/>
  <rect class="g" x="144" y="112" width="16" height="32"/>
  <rect class="b" x="160" y="112" width="32" height="16"/>
  <rect class="g" x="128" y="160" width="48" height="32"/>
  <rect class="b" x="176" y="160" width="48" height="24"/>
  <rect class="g" x="176" y="184" width="24" height="8"/>
  <rect class="b" x="200" y="184" width="24" height="8"/>

  <!-- Blue domain right-center -->
  <rect class="b" x="224" y="64"  width="80" height="80"/>
  <rect class="g" x="240" y="80"  width="24" height="24"/>
  <rect class="g" x="272" y="72"  width="16" height="32"/>
  <rect class="b" x="224" y="144" width="40" height="48"/>
  <rect class="g" x="264" y="144" width="40" height="32"/>
  <rect class="b" x="264" y="176" width="24" height="16"/>
  <rect class="g" x="288" y="176" width="16" height="16"/>

  <!-- Right lower -->
  <rect class="g" x="304" y="64"  width="48" height="64"/>
  <rect class="b" x="320" y="80"  width="16" height="32"/>
  <rect class="g" x="304" y="128" width="24" height="48"/>
  <rect class="b" x="328" y="128" width="24" height="32"/>
  <rect class="g" x="328" y="160" width="16" height="16"/>
  <rect class="b" x="344" y="160" width="8"  height="16"/>

  <!-- Far right lower -->
  <rect class="g" x="352" y="64"  width="48" height="48"/>
  <rect class="b" x="368" y="80"  width="16" height="24"/>
  <rect class="b" x="352" y="112" width="32" height="48"/>
  <rect class="g" x="360" y="128" width="16" height="16"/>
  <rect class="g" x="384" y="112" width="16" height="48"/>

  <!-- Bottom two quadrants — more ordered, gold dominates -->
  <rect class="g" x="0"   y="192" width="128" height="96"/>
  <rect class="b" x="16"  y="208" width="32" height="32"/>
  <rect class="b" x="64"  y="216" width="24" height="24"/>
  <rect class="b" x="96"  y="200" width="16" height="16"/>
  <rect class="g" x="0"   y="288" width="160" height="112"/>
  <rect class="b" x="24"  y="304" width="24" height="32"/>
  <rect class="b" x="72"  y="296" width="32" height="24"/>
  <rect class="b" x="120" y="312" width="24" height="24"/>

  <!-- Center bottom — blue cluster -->
  <rect class="b" x="128" y="192" width="80" height="80"/>
  <rect class="g" x="144" y="208" width="24" height="40"/>
  <rect class="g" x="176" y="200" width="16" height="24"/>
  <rect class="b" x="128" y="272" width="40" height="48"/>
  <rect class="g" x="168" y="272" width="40" height="32"/>
  <rect class="b" x="168" y="304" width="16" height="16"/>
  <rect class="g" x="184" y="304" width="24" height="16"/>

  <!-- Right-center bottom -->
  <rect class="g" x="208" y="192" width="96" height="80"/>
  <rect class="b" x="224" y="208" width="32" height="32"/>
  <rect class="b" x="272" y="200" width="16" height="24"/>
  <rect class="g" x="208" y="272" width="48" height="128"/>
  <rect class="b" x="256" y="272" width="48" height="48"/>
  <rect class="g" x="256" y="320" width="32" height="80"/>
  <rect class="b" x="288" y="320" width="16" height="48"/>
  <rect class="g" x="288" y="368" width="16" height="32"/>

  <!-- Far right bottom -->
  <rect class="b" x="304" y="192" width="32" height="64"/>
  <rect class="g" x="320" y="192" width="80" height="48"/>
  <rect class="b" x="336" y="208" width="32" height="24"/>
  <rect class="b" x="304" y="256" width="48" height="48"/>
  <rect class="g" x="320" y="272" width="16" height="16"/>
  <rect class="g" x="352" y="256" width="48" height="64"/>
  <rect class="b" x="360" y="272" width="24" height="24"/>
  <rect class="g" x="304" y="304" width="48" height="96"/>
  <rect class="b" x="320" y="320" width="16" height="32"/>
  <rect class="b" x="352" y="320" width="24" height="48"/>
  <rect class="g" x="352" y="368" width="24" height="32"/>
  <rect class="g" x="376" y="304" width="24" height="96"/>

  <!-- Bottom strip -->
  <rect class="g" x="0"   y="384" width="208" height="16"/>
  <rect class="b" x="32"  y="388" width="16" height="8"/>
  <rect class="b" x="80"  y="386" width="24" height="8"/>
  <rect class="b" x="144" y="388" width="16" height="8"/>

  <!-- Hebrew text label -->
  <text x="200" y="214" text-anchor="middle" font-family="'Times New Roman', serif"
        font-size="18" fill="#F5F0E0" opacity="0.85" direction="rtl">
    כְּאִישׁ אֶחָד בְּלֵב אֶחָד
  </text>
</svg>
