<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#1a0f00"/>
  <!-- Penrose-like rhombuses radiating from center -->
  <polygon points="100,100 120,80 140,100 120,120" fill="#D4A843" opacity="0.9"/>
  <polygon points="100,100 80,80 100,60 120,80" fill="#F2E4C0" opacity="0.85"/>
  <polygon points="100,100 120,80 140,60 120,60" fill="#B8D4E8" opacity="0.8"/>
  <polygon points="100,100 80,80 60,100 80,120" fill="#D4A843" opacity="0.9"/>
  <polygon points="100,100 120,120 140,100 140,120" fill="#F2E4C0" opacity="0.85"/>
  <polygon points="100,100 80,120 60,100 60,80" fill="#B8D4E8" opacity="0.8"/>
  <polygon points="100,100 120,120 100,140 80,120" fill="#D4A843" opacity="0.9"/>
  <polygon points="100,100 80,120 60,140 80,140" fill="#2B4F7A" opacity="0.8"/>
  <polygon points="100,100 100,60 80,40 80,60" fill="#2B4F7A" opacity="0.8"/>
  <polygon points="100,100 140,120 160,100 140,80" fill="#F2E4C0" opacity="0.85"/>
  <!-- Aleph at center -->
  <text x="100" y="108" text-anchor="middle" font-family="serif" font-size="22"
        fill="#fff8e8" opacity="0.95" filter="url(#glow)">א</text>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
