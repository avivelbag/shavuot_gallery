<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="400" fill="#050510"/>

  <!-- ambient glow from centre -->
  <rect width="400" height="400" fill="url(#glow)"/>

  <!-- 7×7 grid: each square is 46×46 px with 4px gap; grid starts at (15,30) -->
  <!-- Probability values approximate a quantum walk at step 24:
       centre cells bright gold, interference fringes in violet,
       edges dim indigo, top-right corner (50th gate) white-bordered, dark -->

  <!-- Row 0 (y=0): top row — dim -->
  <rect x="15"  y="30"  width="46" height="46" fill="#0f0630" rx="2"/>
  <rect x="65"  y="30"  width="46" height="46" fill="#160840" rx="2"/>
  <rect x="115" y="30"  width="46" height="46" fill="#220a50" rx="2"/>
  <rect x="165" y="30"  width="46" height="46" fill="#1a0840" rx="2"/>
  <rect x="215" y="30"  width="46" height="46" fill="#150730" rx="2"/>
  <rect x="265" y="30"  width="46" height="46" fill="#0e0520" rx="2"/>
  <!-- top-right: 50th gate — white border, very dark interior -->
  <rect x="315" y="30"  width="46" height="46" fill="#080218" rx="2" stroke="white" stroke-width="2"/>
  <text x="338" y="57" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="rgba(255,255,255,0.6)">50</text>

  <!-- Row 1 -->
  <rect x="15"  y="80"  width="46" height="46" fill="#160840" rx="2"/>
  <rect x="65"  y="80"  width="46" height="46" fill="#3a1280" rx="2"/>
  <rect x="115" y="80"  width="46" height="46" fill="#5a1898" rx="2"/>
  <rect x="165" y="80"  width="46" height="46" fill="#4a1588" rx="2"/>
  <rect x="215" y="80"  width="46" height="46" fill="#351080" rx="2"/>
  <rect x="265" y="80"  width="46" height="46" fill="#200a58" rx="2"/>
  <rect x="315" y="80"  width="46" height="46" fill="#100528" rx="2"/>

  <!-- Row 2 -->
  <rect x="15"  y="130" width="46" height="46" fill="#220a50" rx="2"/>
  <rect x="65"  y="130" width="46" height="46" fill="#5a1898" rx="2"/>
  <rect x="115" y="130" width="46" height="46" fill="#8830b8" rx="2"/>
  <rect x="165" y="130" width="46" height="46" fill="#a040c8" rx="2"/>
  <rect x="215" y="130" width="46" height="46" fill="#7828a8" rx="2"/>
  <rect x="265" y="130" width="46" height="46" fill="#481490" rx="2"/>
  <rect x="315" y="130" width="46" height="46" fill="#1e0840" rx="2"/>

  <!-- Row 3 — centre row, brightest -->
  <rect x="15"  y="180" width="46" height="46" fill="#1a0840" rx="2"/>
  <rect x="65"  y="180" width="46" height="46" fill="#4a1588" rx="2"/>
  <rect x="115" y="180" width="46" height="46" fill="#a040c8" rx="2"/>
  <rect x="165" y="180" width="46" height="46" fill="#D4A017" rx="2"/>
  <rect x="215" y="180" width="46" height="46" fill="#b06018" rx="2"/>
  <rect x="265" y="180" width="46" height="46" fill="#6030a0" rx="2"/>
  <rect x="315" y="180" width="46" height="46" fill="#281060" rx="2"/>

  <!-- Row 4 -->
  <rect x="15"  y="230" width="46" height="46" fill="#150730" rx="2"/>
  <rect x="65"  y="230" width="46" height="46" fill="#351080" rx="2"/>
  <rect x="115" y="230" width="46" height="46" fill="#7828a8" rx="2"/>
  <rect x="165" y="230" width="46" height="46" fill="#b06018" rx="2"/>
  <rect x="215" y="230" width="46" height="46" fill="#8838b0" rx="2"/>
  <rect x="265" y="230" width="46" height="46" fill="#501890" rx="2"/>
  <rect x="315" y="230" width="46" height="46" fill="#1e0840" rx="2"/>

  <!-- Row 5 -->
  <rect x="15"  y="280" width="46" height="46" fill="#0e0520" rx="2"/>
  <rect x="65"  y="280" width="46" height="46" fill="#200a58" rx="2"/>
  <rect x="115" y="280" width="46" height="46" fill="#481490" rx="2"/>
  <rect x="165" y="280" width="46" height="46" fill="#6030a0" rx="2"/>
  <rect x="215" y="280" width="46" height="46" fill="#501890" rx="2"/>
  <rect x="265" y="280" width="46" height="46" fill="#2e0e68" rx="2"/>
  <rect x="315" y="280" width="46" height="46" fill="#140630" rx="2"/>

  <!-- Row 6 (bottom) -->
  <rect x="15"  y="330" width="46" height="46" fill="#0a0318" rx="2"/>
  <rect x="65"  y="330" width="46" height="46" fill="#140528" rx="2"/>
  <rect x="115" y="330" width="46" height="46" fill="#1e0840" rx="2"/>
  <rect x="165" y="330" width="46" height="46" fill="#281060" rx="2"/>
  <rect x="215" y="330" width="46" height="46" fill="#1e0840" rx="2"/>
  <rect x="265" y="330" width="46" height="46" fill="#140528" rx="2"/>
  <rect x="315" y="330" width="46" height="46" fill="#0a0318" rx="2"/>

  <!-- caption -->
  <text x="200" y="393" text-anchor="middle"
        font-family="'Noto Serif Hebrew','David','Frank Ruehl','Times New Roman',serif"
        font-size="18" fill="#D4A017" direction="rtl">שַׁעֲרֵי בִינָה</text>
</svg>
