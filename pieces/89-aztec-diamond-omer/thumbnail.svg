<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0C0C0C"/>

  <!-- Aztec diamond shape clipped to rotated square outline -->
  <defs>
    <clipPath id="diamond">
      <polygon points="200,40 360,200 200,360 40,200"/>
    </clipPath>
  </defs>

  <!-- Background fill for diamond area -->
  <polygon points="200,40 360,200 200,360 40,200" fill="#111"/>

  <!-- Frozen corner regions — colored domino blocks -->
  <!-- North corner: wheat gold (#D4A017) horizontal dominoes -->
  <g clip-path="url(#diamond)">
    <!-- North frozen region -->
    <rect x="160" y="50"  width="40" height="18" fill="#D4A017" rx="1"/>
    <rect x="160" y="72"  width="40" height="18" fill="#D4A017" rx="1"/>
    <rect x="168" y="94"  width="40" height="18" fill="#D4A017" rx="1"/>
    <rect x="152" y="116" width="40" height="18" fill="#D4A017" rx="1"/>
    <rect x="176" y="116" width="40" height="18" fill="#D4A017" rx="1"/>

    <!-- South frozen region: harvest amber (#B8860B) -->
    <rect x="160" y="332" width="40" height="18" fill="#B8860B" rx="1"/>
    <rect x="160" y="310" width="40" height="18" fill="#B8860B" rx="1"/>
    <rect x="152" y="288" width="40" height="18" fill="#B8860B" rx="1"/>
    <rect x="176" y="288" width="40" height="18" fill="#B8860B" rx="1"/>
    <rect x="168" y="266" width="40" height="18" fill="#B8860B" rx="1"/>

    <!-- East frozen region: field green (#4A7C59) vertical dominoes -->
    <rect x="332" y="160" width="18" height="40" fill="#4A7C59" rx="1"/>
    <rect x="310" y="160" width="18" height="40" fill="#4A7C59" rx="1"/>
    <rect x="288" y="152" width="18" height="40" fill="#4A7C59" rx="1"/>
    <rect x="288" y="176" width="18" height="40" fill="#4A7C59" rx="1"/>
    <rect x="266" y="168" width="18" height="40" fill="#4A7C59" rx="1"/>

    <!-- West frozen region: deep sage (#2D5A3D) vertical dominoes -->
    <rect x="50"  y="160" width="18" height="40" fill="#2D5A3D" rx="1"/>
    <rect x="72"  y="160" width="18" height="40" fill="#2D5A3D" rx="1"/>
    <rect x="94"  y="152" width="18" height="40" fill="#2D5A3D" rx="1"/>
    <rect x="94"  y="176" width="18" height="40" fill="#2D5A3D" rx="1"/>
    <rect x="116" y="168" width="18" height="40" fill="#2D5A3D" rx="1"/>

    <!-- Central chaotic zone — mixed small colored rects -->
    <rect x="152" y="152" width="18" height="9"  fill="#D4A017" rx="1" opacity="0.8"/>
    <rect x="174" y="152" width="9"  height="18" fill="#4A7C59" rx="1" opacity="0.8"/>
    <rect x="187" y="152" width="18" height="9"  fill="#B8860B" rx="1" opacity="0.8"/>
    <rect x="210" y="152" width="9"  height="18" fill="#2D5A3D" rx="1" opacity="0.8"/>
    <rect x="223" y="152" width="18" height="9"  fill="#D4A017" rx="1" opacity="0.8"/>

    <rect x="152" y="165" width="9"  height="18" fill="#2D5A3D" rx="1" opacity="0.8"/>
    <rect x="165" y="165" width="18" height="9"  fill="#B8860B" rx="1" opacity="0.8"/>
    <rect x="187" y="165" width="9"  height="18" fill="#4A7C59" rx="1" opacity="0.8"/>
    <rect x="200" y="165" width="18" height="9"  fill="#D4A017" rx="1" opacity="0.8"/>
    <rect x="222" y="165" width="9"  height="18" fill="#B8860B" rx="1" opacity="0.8"/>

    <rect x="152" y="183" width="18" height="9"  fill="#4A7C59" rx="1" opacity="0.8"/>
    <rect x="174" y="183" width="9"  height="18" fill="#D4A017" rx="1" opacity="0.8"/>
    <rect x="187" y="183" width="18" height="9"  fill="#2D5A3D" rx="1" opacity="0.8"/>
    <rect x="209" y="183" width="9"  height="18" fill="#B8860B" rx="1" opacity="0.8"/>
    <rect x="222" y="183" width="18" height="9"  fill="#4A7C59" rx="1" opacity="0.8"/>

    <rect x="152" y="196" width="9"  height="18" fill="#B8860B" rx="1" opacity="0.8"/>
    <rect x="165" y="196" width="18" height="9"  fill="#4A7C59" rx="1" opacity="0.8"/>
    <rect x="187" y="196" width="9"  height="18" fill="#D4A017" rx="1" opacity="0.8"/>
    <rect x="200" y="196" width="18" height="9"  fill="#2D5A3D" rx="1" opacity="0.8"/>
    <rect x="222" y="196" width="9"  height="18" fill="#D4A017" rx="1" opacity="0.8"/>

    <rect x="152" y="214" width="18" height="9"  fill="#D4A017" rx="1" opacity="0.8"/>
    <rect x="174" y="214" width="9"  height="18" fill="#2D5A3D" rx="1" opacity="0.8"/>
    <rect x="187" y="214" width="18" height="9"  fill="#4A7C59" rx="1" opacity="0.8"/>
    <rect x="209" y="214" width="9"  height="18" fill="#D4A017" rx="1" opacity="0.8"/>
    <rect x="222" y="214" width="18" height="9"  fill="#2D5A3D" rx="1" opacity="0.8"/>

    <rect x="152" y="227" width="9"  height="18" fill="#4A7C59" rx="1" opacity="0.8"/>
    <rect x="165" y="227" width="18" height="9"  fill="#B8860B" rx="1" opacity="0.8"/>
    <rect x="187" y="227" width="9"  height="18" fill="#2D5A3D" rx="1" opacity="0.8"/>
    <rect x="200" y="227" width="18" height="9"  fill="#4A7C59" rx="1" opacity="0.8"/>
    <rect x="222" y="227" width="9"  height="18" fill="#B8860B" rx="1" opacity="0.8"/>
  </g>

  <!-- Arctic circle boundary — faint white circle -->
  <circle cx="200" cy="200" r="108" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Diamond outline -->
  <polygon points="200,40 360,200 200,360 40,200" fill="none" stroke="#555" stroke-width="1"/>
</svg>
