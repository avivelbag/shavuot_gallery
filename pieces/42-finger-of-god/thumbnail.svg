<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="outerBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A2A4E" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="c1grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8B5A00"/>
      <stop offset="60%" stop-color="#C4922A"/>
      <stop offset="100%" stop-color="#F5D87A"/>
    </radialGradient>
    <radialGradient id="c2grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8B5A00"/>
      <stop offset="60%" stop-color="#C4922A"/>
      <stop offset="100%" stop-color="#F5D87A"/>
    </radialGradient>
    <radialGradient id="c3grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8B5A00"/>
      <stop offset="60%" stop-color="#C4922A"/>
      <stop offset="100%" stop-color="#F5D87A"/>
    </radialGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#outerBg)"/>

  <!-- Outer enclosing circle border -->
  <circle cx="200" cy="150" r="138" fill="none" stroke="#F5D87A" stroke-width="1.5" opacity="0.8"/>

  <!-- Left large seed circle -->
  <circle cx="131" cy="150" r="69" fill="url(#c1grad)" opacity="0.92"/>

  <!-- Right large seed circle -->
  <circle cx="269" cy="150" r="69" fill="url(#c2grad)" opacity="0.92"/>

  <!-- Top Soddy circle (between outer, left, right) -->
  <circle cx="200" cy="54" r="42" fill="#C4922A" opacity="0.88"/>

  <!-- Bottom Soddy circle -->
  <circle cx="200" cy="246" r="42" fill="#C4922A" opacity="0.88"/>

  <!-- Level-2 circles (smaller) -->
  <circle cx="155" cy="77"  r="22" fill="#D4A83A" opacity="0.82"/>
  <circle cx="245" cy="77"  r="22" fill="#D4A83A" opacity="0.82"/>
  <circle cx="155" cy="223" r="22" fill="#D4A83A" opacity="0.82"/>
  <circle cx="245" cy="223" r="22" fill="#D4A83A" opacity="0.82"/>
  <circle cx="89"  cy="112" r="18" fill="#D4A83A" opacity="0.78"/>
  <circle cx="89"  cy="188" r="18" fill="#D4A83A" opacity="0.78"/>
  <circle cx="311" cy="112" r="18" fill="#D4A83A" opacity="0.78"/>
  <circle cx="311" cy="188" r="18" fill="#D4A83A" opacity="0.78"/>
  <circle cx="200" cy="150" r="16" fill="#E0B848" opacity="0.80"/>

  <!-- Level-3 small circles (white) -->
  <circle cx="130" cy="56"  r="9" fill="#FFFFFF" opacity="0.70"/>
  <circle cx="270" cy="56"  r="9" fill="#FFFFFF" opacity="0.70"/>
  <circle cx="130" cy="244" r="9" fill="#FFFFFF" opacity="0.70"/>
  <circle cx="270" cy="244" r="9" fill="#FFFFFF" opacity="0.70"/>
  <circle cx="72"  cy="83"  r="7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="328" cy="83"  r="7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="72"  cy="217" r="7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="328" cy="217" r="7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="66"  cy="150" r="7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="334" cy="150" r="7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="200" cy="108" r="7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="200" cy="192" r="7" fill="#FFFFFF" opacity="0.65"/>

  <!-- Tiny white fragments -->
  <circle cx="175" cy="60"  r="4" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="225" cy="60"  r="4" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="120" cy="100" r="4" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="280" cy="100" r="4" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="120" cy="200" r="4" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="280" cy="200" r="4" fill="#FFFFFF" opacity="0.55"/>

  <!-- Aleph in center of left seed circle -->
  <text x="131" y="162" font-size="62" font-family="serif" font-weight="bold"
        fill="#F5E6C8" text-anchor="middle" dominant-baseline="middle"
        opacity="0.70" filter="url(#softglow)">א</text>
</svg>
