<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="cenGlow" cx="50%" cy="50%" r="12%">
      <stop offset="0%" stop-color="#FFFBE6" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seedGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#E8C050"/>
      <stop offset="60%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B88010"/>
    </radialGradient>
  </defs>

  <!-- Background — deep indigo-black -->
