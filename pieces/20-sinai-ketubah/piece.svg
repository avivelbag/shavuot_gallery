<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     id="ketubah-svg"
     viewBox="0 0 600 840"
     width="600" height="840">

  <defs>
    <!-- Vine scroll unit: 30x30. An S-curve stem with two gold leaves. -->
    <symbol id="vine" viewBox="0 0 30 30">
      <path d="M 9,0 C 9,7 21,7 21,15 C 21,23 9,23 9,30"
            fill="none" stroke="#2c2060" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 9,9 C 1,5 0,15 9,14 Z" fill="#b8860b" stroke="#2c2060" stroke-width="0.7"/>
      <path d="M 21,16 C 29,15 30,25 21,21 Z" fill="#b8860b" stroke="#2c2060" stroke-width="0.7"/>
    </symbol>

    <!-- Pomegranate unit: 30x30. A round fruit with five-pronged crown. -->
    <symbol id="pomegranate" viewBox="0 0 30 30">
      <circle cx="15" cy="21" r="8" fill="#b8860b" stroke="#2c2060" stroke-width="1.2"/>
      <path d="M 15,13 L 15,7 M 11,14 L 8,8 M 19,14 L 22,8 M 9,16 L 5,12 M 21,16 L 25,12"
            fill="none" stroke="#2c2060" stroke-width="1.1" stroke-linecap="round"/>
      <circle cx="15" cy="13" r="1.8" fill="#2c2060"/>
    </symbol>

    <!-- Corner rosette: 40x40. Eight-petalled flower centered at (20,20). -->
    <symbol id="corner" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="17" fill="none" stroke="#2c2060" stroke-width="1.2"/>
      <circle cx="20" cy="20" r="11" fill="#b8860b" stroke="#2c2060" stroke-width="1"/>
      <circle cx="20" cy="20" r="4" fill="#2c2060"/>
      <ellipse cx="20" cy="6"  rx="2.5" ry="5"   fill="#b8860b" stroke="#2c2060" stroke-width="0.8"/>
      <ellipse cx="34" cy="20" rx="5"   ry="2.5"  fill="#b8860b" stroke="#2c2060" stroke-width="0.8"/>
      <ellipse cx="20" cy="34" rx="2.5" ry="5"    fill="#b8860b" stroke="#2c2060" stroke-width="0.8"/>
      <ellipse cx="6"  cy="20" rx="5"   ry="2.5"  fill="#b8860b" stroke="#2c2060" stroke-width="0.8"/>
      <ellipse cx="29.2" cy="10.8" rx="2.5" ry="5" fill="#b8860b" stroke="#2c2060" stroke-width="0.8" transform="rotate(45,29.2,10.8)"/>
      <ellipse cx="29.2" cy="29.2" rx="2.5" ry="5" fill="#b8860b" stroke="#2c2060" stroke-width="0.8" transform="rotate(-45,29.2,29.2)"/>
      <ellipse cx="10.8" cy="29.2" rx="2.5" ry="5" fill="#b8860b" stroke="#2c2060" stroke-width="0.8" transform="rotate(45,10.8,29.2)"/>
      <ellipse cx="10.8" cy="10.8" rx="2.5" ry="5" fill="#b8860b" stroke="#2c2060" stroke-width="0.8" transform="rotate(-45,10.8,10.8)"/>
    </symbol>

    <!-- Ornamental divider: a horizontal flourish path used as a <use> target -->
    <symbol id="divider" viewBox="0 0 200 16">
      <path d="M 0,8 C 20,2 40,14 60,8 C 80,2 100,14 120,8 C 140,2 160,14 180,8 L 200,8"
            fill="none" stroke="#b8860b" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="100" cy="8" r="3" fill="#b8860b"/>
      <circle cx="60"  cy="8" r="2" fill="#b8860b"/>
      <circle cx="140" cy="8" r="2" fill="#b8860b"/>
    </symbol>
  </defs>

  <!-- Parchment background -->
  <rect width="600" height="840" fill="#f5ead8"/>

  <!-- Outer double border frame -->
  <rect x="12" y="12" width="576" height="816" fill="none" stroke="#2c2060" stroke-width="2.5"/>
  <rect x="17" y="17" width="566" height="806" fill="none" stroke="#2c2060" stroke-width="0.8"/>

  <!-- Inner frame -->
  <rect x="52" y="52" width="496" height="736" fill="none" stroke="#2c2060" stroke-width="1.2"/>

  <!-- Gold dashed inset -->
  <rect x="60" y="60" width="480" height="720" fill="none" stroke="#b8860b" stroke-width="0.8" stroke-dasharray="5,3"/>

  <!-- Border decorative units — generated by the script below -->
  <g id="border-layer"/>

  <!-- ===== Text content ===== -->

  <!-- Piece label (small caps) -->
  <text x="300" y="108" text-anchor="middle"
        font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
        font-size="11" letter-spacing="3" fill="#2c2060" opacity="0.7">SHAVUOT  ·  MATAN TORAH</text>

  <!-- Main Hebrew heading: "In a canopy stood Mount Sinai" (midrashic paraphrase) -->
  <text x="300" y="200"
        text-anchor="middle"
        font-family="'David', 'SBL Hebrew', 'FreeSerif', Georgia, serif"
        font-size="28" fill="#2c2060"
        direction="rtl" unicode-bidi="bidi-override">בְּמָקוֹם חֻפָּה עָמַד הָר סִינַי</text>

  <!-- English translation of heading -->
  <text x="300" y="228"
        text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="12" fill="#2c2060" font-style="italic">"In the place of a canopy stood Mount Sinai"</text>

  <!-- Ornamental divider top -->
  <use href="#divider" x="200" y="244" width="200" height="16"/>

  <!-- Source citation -->
  <text x="300" y="278"
        text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="10" fill="#2c2060" letter-spacing="1" opacity="0.8">Shabbat 88a  ·  Exodus Rabbah 41:1</text>

  <!-- Decorative star separator -->
  <text x="300" y="310" text-anchor="middle"
        font-family="Georgia, serif" font-size="14" fill="#b8860b">✦  ✦  ✦</text>

  <!-- Main verse: Exodus 24:7 — na'aseh v'nishma -->
  <text x="300" y="390"
        text-anchor="middle"
        font-family="'David', 'SBL Hebrew', 'FreeSerif', Georgia, serif"
        font-size="52" fill="#2c2060"
        direction="rtl" unicode-bidi="bidi-override">נַעֲשֶׂה וְנִשְׁמָע</text>

  <!-- Translation of verse -->
  <text x="300" y="422"
        text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="13" fill="#2c2060" font-style="italic">"We will do and we will hear"</text>

  <!-- Verse attribution -->
  <text x="300" y="444"
        text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="10" fill="#2c2060" letter-spacing="1" opacity="0.8">Exodus 24:7  ·  שמות כד:ז</text>

  <!-- Ornamental divider bottom -->
  <use href="#divider" x="200" y="462" width="200" height="16"/>

  <!-- Covenant confirmation — Esther 9:27 key phrase -->
  <text x="300" y="510"
        text-anchor="middle"
        font-family="'David', 'SBL Hebrew', 'FreeSerif', Georgia, serif"
        font-size="22" fill="#2c2060"
        direction="rtl" unicode-bidi="bidi-override">קִיְּמוּ וְקִבְּלוּ</text>

  <text x="300" y="533"
        text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="11" fill="#2c2060" font-style="italic">"They confirmed and they accepted"</text>

  <text x="300" y="552"
        text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="10" fill="#2c2060" letter-spacing="1" opacity="0.8">Esther 9:27  ·  אסתר ט:כז</text>

  <!-- Lower ornamental element: a stylised menorah silhouette in gold -->
  <g transform="translate(270,585)" fill="none" stroke="#b8860b" stroke-width="1.2">
    <!-- Central shaft -->
    <line x1="30" y1="0" x2="30" y2="50"/>
    <!-- Base -->
    <path d="M 10,50 L 50,50"/>
    <!-- Arms: left -->
    <path d="M 30,15 C 20,15 15,10 15,5"/>
    <path d="M 30,25 C 15,25 8,18 8,10"/>
    <!-- Arms: right -->
    <path d="M 30,15 C 40,15 45,10 45,5"/>
    <path d="M 30,25 C 45,25 52,18 52,10"/>
    <!-- Flames (small gold dots) -->
    <circle cx="30" cy="0"  r="2.5" fill="#b8860b" stroke="none"/>
    <circle cx="15" cy="5"  r="2"   fill="#b8860b" stroke="none"/>
    <circle cx="45" cy="5"  r="2"   fill="#b8860b" stroke="none"/>
    <circle cx="8"  cy="10" r="1.8" fill="#b8860b" stroke="none"/>
    <circle cx="52" cy="10" r="1.8" fill="#b8860b" stroke="none"/>
  </g>

  <!-- Bottom label -->
  <text x="300" y="680"
        text-anchor="middle"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="10" fill="#2c2060" letter-spacing="2" opacity="0.6">SHAVUOT  5786</text>

  <!-- Gold bottom divider line -->
  <line x1="150" y1="692" x2="450" y2="692" stroke="#b8860b" stroke-width="0.8"/>

  <script type="text/javascript">
  /* <![CDATA[ */
  (function () {
    var ns = 'http://www.w3.org/2000/svg';
    var layer = document.getElementById('border-layer');
    if (!layer) { return; }

    /**
     * Append a <use> referencing a symbol, positioned by transform.
     * angleDeg rotates around the unit's own center (half of w/h).
     */
    function placeUnit(symbolId, tx, ty, w, h, angleDeg) {
      var use = document.createElementNS(ns, 'use');
      use.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', '#' + symbolId);
      use.setAttribute('href', '#' + symbolId);
      use.setAttribute('width', String(w));
      use.setAttribute('height', String(h));
      var t = 'translate(' + tx + ',' + ty + ')';
      if (angleDeg) {
        t += ' rotate(' + angleDeg + ',' + (w / 2) + ',' + (h / 2) + ')';
      }
      use.setAttribute('transform', t);
      layer.appendChild(use);
    }

    /*
     * Border layout:
     *   SVG:        600 x 840
     *   Outer rect: x=12, y=12, w=576, h=816
     *   Inner rect: x=52, y=52, w=496, h=736
     *   Unit zone:  between y=17 and y=52 (top), mirrored bottom; same for sides.
     *   Unit size:  vine/pomegranate = 30x30, corner rosette = 40x40
     *
     * Top/bottom: usable x from 52 to 548 = 496px.
     *   Corner rosettes occupy 40px at each end → center strip = 416px.
     *   Units: 416 / 30 = 13.87 → 14 units. Offset = (416 - 14*30) / 2 = 8.
     *   First unit x = 52 + 40 + 8 = 100.  Step = 30.
     *   Alternate vine / pomegranate for variety.
     *
     * Left/right: usable y from 52 to 788 = 736px.
     *   Corner rosettes occupy 40px at each end → center strip = 656px.
     *   Units: 656 / 30 = 21.87 → 22 units. Offset = (656 - 22*30) / 2 = 8.
     *   First unit y = 52 + 40 + 8 = 100.  Step = 30.
     *
     * Units are centered in the 35px border zone:
     *   Top: ty = 17 + (35 - 30) / 2 = 19
     *   Bottom: ty = 788 + (35 - 30) / 2 = 790
     *   Left: tx = 17 + (35 - 30) / 2 = 19
     *   Right: tx = 548 + (35 - 30) / 2 = 550
     */

    var VINE = 'vine';
    var POME = 'pomegranate';
    var unitW = 30, unitH = 30;
    var cornerW = 40, cornerH = 40;

    /* ---- Corners ---- */
    placeUnit('corner', 12,  12,  cornerW, cornerH, 0);
    placeUnit('corner', 548, 12,  cornerW, cornerH, 90);
    placeUnit('corner', 12,  788, cornerW, cornerH, 270);
    placeUnit('corner', 548, 788, cornerW, cornerH, 180);

    /* ---- Top side ---- */
    var topTY = 19, topFirstX = 100, topStep = 30, topCount = 14;
    for (var i = 0; i < topCount; i++) {
      placeUnit(i % 2 === 0 ? VINE : POME, topFirstX + i * topStep, topTY, unitW, unitH, 0);
    }

    /* ---- Bottom side (rotated 180°) ---- */
    var botTY = 790;
    for (var i = 0; i < topCount; i++) {
      placeUnit(i % 2 === 0 ? VINE : POME, topFirstX + i * topStep, botTY, unitW, unitH, 180);
    }

    /* ---- Left side (rotated 90°) ---- */
    var leftTX = 19, leftFirstY = 100, leftStep = 30, leftCount = 22;
    for (var i = 0; i < leftCount; i++) {
      placeUnit(i % 2 === 0 ? VINE : POME, leftTX, leftFirstY + i * leftStep, unitW, unitH, 90);
    }

    /* ---- Right side (rotated 270°) ---- */
    var rightTX = 550;
    for (var i = 0; i < leftCount; i++) {
      placeUnit(i % 2 === 0 ? VINE : POME, rightTX, leftFirstY + i * leftStep, unitW, unitH, 270);
    }
  }());
  /* ]]> */
  </script>
</svg>
