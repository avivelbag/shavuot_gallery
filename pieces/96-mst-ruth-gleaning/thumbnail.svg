    <ellipse cx="280" cy="160" rx="5" ry="2.5" transform="rotate(15 280 160)"/>
    <ellipse cx="305" cy="175" rx="5" ry="2.5" transform="rotate(15 305 175)"/>
    <ellipse cx="330" cy="160" rx="5" ry="2.5" transform="rotate(15 330 160)"/>
    <ellipse cx="355" cy="178" rx="5" ry="2.5" transform="rotate(15 355 178)"/>
    <ellipse cx="340" cy="230" rx="5" ry="2.5" transform="rotate(15 340 230)"/>
    <ellipse cx="365" cy="215" rx="5" ry="2.5" transform="rotate(15 365 215)"/>
