<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B89A50"/>
      <stop offset="100%" stop-color="#5C3D1E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- MST edges (partial - suggesting harvest in progress) -->
  <g stroke="#C8820A" stroke-width="1.4" opacity="0.9">
    <!-- Central cluster around Ruth -->
    <line x1="133" y1="266" x2="100" y2="240"/>
    <line x1="133" y1="266" x2="160" y2="245"/>
    <line x1="133" y1="266" x2="148" y2="295"/>
    <line x1="133" y1="266" x2="115" y2="300"/>
    <line x1="133" y1="266" x2="165" y2="278"/>
    <!-- Upper connections -->
    <line x1="100" y1="240" x2="80" y2="215"/>
    <line x1="100" y1="240" x2="120" y2="210"/>
    <line x1="160" y1="245" x2="185" y2="220"/>
    <line x1="160" y1="245" x2="200" y2="255"/>
    <line x1="80" y1="215" x2="65" y2="188"/>
    <line x1="65" y1="188" x2="90" y2="170"/>
    <line x1="90" y1="170" x2="115" y2="185"/>
    <line x1="115" y1="185" x2="140" y2="170"/>
    <line x1="140" y1="170" x2="165" y2="185"/>
    <line x1="185" y1="220" x2="210" y2="200"/>
    <line x1="210" y1="200" x2="235" y2="215"/>
    <line x1="200" y1="255" x2="230" y2="265"/>
    <line x1="230" y1="265" x2="260" y2="255"/>
    <!-- Lower connections -->
    <line x1="148" y1="295" x2="170" y2="315"/>
    <line x1="115" y1="300" x2="90" y2="320"/>
    <line x1="90" y1="320" x2="65" y2="310"/>
    <line x1="170" y1="315" x2="200" y2="330"/>
    <!-- More spread connections -->
    <line x1="235" y1="215" x2="260" y2="200"/>
    <line x1="260" y1="200" x2="285" y2="218"/>
    <line x1="285" y1="218" x2="310" y2="205"/>
    <line x1="165" y1="278" x2="200" y2="285"/>
    <line x1="200" y1="285" x2="225" y2="300"/>
