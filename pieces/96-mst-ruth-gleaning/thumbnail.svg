    <ellipse cx="100" cy="145" rx="5" ry="2.5" transform="rotate(15 100 145)"/>
    <ellipse cx="125" cy="130" rx="5" ry="2.5" transform="rotate(15 125 130)"/>
    <ellipse cx="150" cy="148" rx="5" ry="2.5" transform="rotate(15 150 148)"/>
