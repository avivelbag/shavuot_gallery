    <ellipse cx="120" cy="210" rx="5" ry="2.5" transform="rotate(15 120 210)"/>
    <ellipse cx="140" cy="170" rx="5" ry="2.5" transform="rotate(15 140 170)"/>
    <ellipse cx="148" cy="295" rx="5" ry="2.5" transform="rotate(15 148 295)"/>
    <ellipse cx="160" cy="245" rx="5" ry="2.5" transform="rotate(15 160 245)"/>
    <ellipse cx="165" cy="185" rx="5" ry="2.5" transform="rotate(15 165 185)"/>
    <ellipse cx="165" cy="278" rx="5" ry="2.5" transform="rotate(15 165 278)"/>
    <ellipse cx="170" cy="315" rx="5" ry="2.5" transform="rotate(15 170 315)"/>
    <ellipse cx="185" cy="220" rx="5" ry="2.5" transform="rotate(15 185 220)"/>
    <ellipse cx="200" cy="255" rx="5" ry="2.5" transform="rotate(15 200 255)"/>
    <ellipse cx="200" cy="285" rx="5" ry="2.5" transform="rotate(15 200 285)"/>
    <ellipse cx="200" cy="330" rx="5" ry="2.5" transform="rotate(15 200 330)"/>
    <ellipse cx="210" cy="200" rx="5" ry="2.5" transform="rotate(15 210 200)"/>
    <ellipse cx="225" cy="300" rx="5" ry="2.5" transform="rotate(15 225 300)"/>
    <ellipse cx="230" cy="265" rx="5" ry="2.5" transform="rotate(15 230 265)"/>
    <ellipse cx="235" cy="215" rx="5" ry="2.5" transform="rotate(15 235 215)"/>
    <ellipse cx="260" cy="200" rx="5" ry="2.5" transform="rotate(15 260 200)"/>
    <ellipse cx="260" cy="255" rx="5" ry="2.5" transform="rotate(15 260 255)"/>
    <ellipse cx="285" cy="218" rx="5" ry="2.5" transform="rotate(15 285 218)"/>
