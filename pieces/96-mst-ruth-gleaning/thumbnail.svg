    <line x1="100" y1="145" x2="125" y2="130"/>
    <line x1="125" y1="130" x2="150" y2="148"/>
    <line x1="150" y1="148" x2="175" y2="132"/>
    <line x1="65" y1="188" x2="50" y2="165"/>
    <line x1="50" y1="165" x2="50" y2="145"/>
