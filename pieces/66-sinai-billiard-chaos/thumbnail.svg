<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A14"/>

  <!-- Gold square border -->
  <rect x="4" y="4" width="392" height="392" fill="none" stroke="#D4A020" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Central circular obstacle with glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#D4A020" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#D4A020" stop-opacity="0"/>
  </radialGradient>
  <circle cx="200" cy="200" r="90" fill="url(#glow)"/>
  <circle cx="200" cy="200" r="60" fill="none" stroke="#D4A020" stroke-width="1.5"/>

  <!-- Diverging billiard trajectories from lower-left cluster -->
  <!-- Particle 1: deep gold — bounces off circle toward upper right -->
  <polyline points="50,340 155,235 195,200 280,115 360,115" fill="none" stroke="#D4A020" stroke-width="1.3" stroke-opacity="0.85"/>

  <!-- Particle 2: crimson — deflects toward upper left wall -->
  <polyline points="55,345 158,240 198,202 140,140 20,140 20,50" fill="none" stroke="#8B1A1A" stroke-width="1.3" stroke-opacity="0.85"/>

  <!-- Particle 3: sapphire — reflects downward right -->
  <polyline points="60,348 160,245 202,204 260,260 370,260" fill="none" stroke="#1A4080" stroke-width="1.3" stroke-opacity="0.85"/>

  <!-- Particle 4: warm white — narrow angle, goes toward right wall -->
  <polyline points="62,350 163,248 203,207 320,320 380,380" fill="none" stroke="#F0E8D0" stroke-width="1.3" stroke-opacity="0.7"/>

  <!-- Particle 5: copper — deflects toward lower left -->
  <polyline points="65,352 165,250 205,210 100,310 20,370" fill="none" stroke="#B85A20" stroke-width="1.3" stroke-opacity="0.85"/>

  <!-- Particle 6: violet — goes steeply up -->
  <polyline points="68,354 168,252 207,212 207,30" fill="none" stroke="#4A1A80" stroke-width="1.3" stroke-opacity="0.85"/>

  <!-- Particle 7: sky — shallow angle to right -->
  <polyline points="70,356 170,254 210,214 370,54" fill="none" stroke="#4080C0" stroke-width="1.3" stroke-opacity="0.85"/>

  <!-- Particle 8: olive — down and left after circle bounce -->
  <polyline points="72,358 172,256 212,218 130,370 20,370" fill="none" stroke="#7A8020" stroke-width="1.2" stroke-opacity="0.75"/>
</svg>
