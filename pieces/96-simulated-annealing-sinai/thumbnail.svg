    <circle cx="292" cy="294" r="3" fill="#4B0082" opacity="0.95"/>
    <circle cx="320" cy="294" r="3" fill="#3A006F" opacity="0.95"/>
    <circle cx="348" cy="294" r="3" fill="#3A006F" opacity="0.95"/>
