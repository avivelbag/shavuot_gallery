<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="100%" stop-color="#D4AA70"/>
    </linearGradient>
    <mask id="crescent1">
      <rect width="400" height="400" fill="black"/>
      <ellipse cx="160" cy="285" rx="115" ry="48" fill="white"/>
      <ellipse cx="132" cy="285" rx="92" ry="37" fill="black"/>
    </mask>
    <mask id="crescent2">
      <rect width="400" height="400" fill="black"/>
      <ellipse cx="300" cy="155" rx="85" ry="35" fill="white"/>
      <ellipse cx="278" cy="155" rx="68" ry="27" fill="black"/>
    </mask>
    <mask id="crescent3">
      <rect width="400" height="400" fill="black"/>
      <ellipse cx="330" cy="340" rx="58" ry="24" fill="white"/>
      <ellipse cx="315" cy="340" rx="46" ry="18" fill="black"/>
    </mask>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Three barchan dune crescents with horns pointing rightward (downwind) -->
  <rect width="400" height="400" fill="#F2D9A0" opacity="0.82" mask="url(#crescent1)"/>
  <rect width="400" height="400" fill="#F2D9A0" opacity="0.75" mask="url(#crescent2)"/>
  <rect width="400" height="400" fill="#F2D9A0" opacity="0.68" mask="url(#crescent3)"/>

  <!-- Faint Hebrew letters מִדְבָּר across the middle -->
  <text x="200" y="210" text-anchor="middle" dominant-baseline="middle"
    font-family="serif" font-size="58" font-weight="bold"
    fill="#8B6914" opacity="0.28" direction="rtl" unicode-bidi="bidi-override">מִדְבָּר</text>
</svg>
