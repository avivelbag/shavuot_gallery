<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="vein-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D4882A" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#D4882A" stop-opacity="0.00"/>
    </radialGradient>
  </defs>

  <!-- Cream background -->
  <rect width="400" height="300" fill="#FAF0DC"/>

  <!-- Main network veins — amber-gold primary paths -->
  <!-- Naomi→Ruth trunk -->
  <path d="M200,75 C185,105 155,130 135,160 C118,185 108,205 100,225"
        stroke="#D4882A" stroke-width="2.8" fill="none" opacity="0.82" filter="url(#vein-blur)"/>
  <!-- Naomi→Boaz trunk -->
  <path d="M200,75 C215,105 245,130 265,160 C282,185 292,205 300,225"
        stroke="#D4882A" stroke-width="2.8" fill="none" opacity="0.82" filter="url(#vein-blur)"/>
  <!-- Ruth→Boaz bottom connector -->
  <path d="M100,225 C150,240 250,240 300,225"
        stroke="#D4882A" stroke-width="2.2" fill="none" opacity="0.75" filter="url(#vein-blur)"/>

  <!-- Secondary branch veins — thinner, rust-toned -->
  <path d="M200,75 C195,100 188,115 175,138 C162,160 145,178 130,195"
        stroke="#C07020" stroke-width="1.5" fill="none" opacity="0.55"/>
  <path d="M200,75 C205,100 212,115 225,138 C238,160 255,178 270,195"
        stroke="#C07020" stroke-width="1.5" fill="none" opacity="0.55"/>
  <!-- Cross-link between main trunks -->
  <path d="M162,148 C185,155 215,155 238,148"
        stroke="#B86018" stroke-width="1.2" fill="none" opacity="0.45"/>
  <path d="M138,178 C165,185 235,185 262,178"
        stroke="#B86018" stroke-width="1.2" fill="none" opacity="0.42"/>
  <!-- Small exploratory tendrils -->
  <path d="M200,75 C202,88 196,100 190,115"
        stroke="#C07020" stroke-width="1.0" fill="none" opacity="0.38"/>
  <path d="M148,172 C155,165 165,158 172,150"
        stroke="#8B3A10" stroke-width="0.9" fill="none" opacity="0.35"/>
  <path d="M252,172 C245,165 235,158 228,150"
        stroke="#8B3A10" stroke-width="0.9" fill="none" opacity="0.35"/>
  <!-- Fine network detail near nodes -->
  <path d="M100,225 C92,215 88,200 95,188"
        stroke="#C07020" stroke-width="0.9" fill="none" opacity="0.40"/>
  <path d="M300,225 C308,215 312,200 305,188"
        stroke="#C07020" stroke-width="0.9" fill="none" opacity="0.40"/>
  <path d="M195,75 C190,65 195,55 200,50"
        stroke="#C07020" stroke-width="0.9" fill="none" opacity="0.38"/>

  <!-- Rust accent thickening at convergence points -->
  <circle cx="163" cy="150" r="3.5" fill="#8B3A10" opacity="0.22"/>
  <circle cx="237" cy="150" r="3.5" fill="#8B3A10" opacity="0.22"/>
  <circle cx="200" cy="196" r="4.0" fill="#8B3A10" opacity="0.20"/>

  <!-- Food-source glow halos -->
  <circle cx="200" cy="75"  r="28" fill="url(#nodeGlow)"/>
  <circle cx="100" cy="225" r="28" fill="url(#nodeGlow)"/>
  <circle cx="300" cy="225" r="28" fill="url(#nodeGlow)"/>

  <!-- Node circles -->
  <circle cx="200" cy="75"  r="16" fill="rgba(212,136,42,0.18)" stroke="#8B3A10" stroke-width="1.4"/>
  <circle cx="100" cy="225" r="16" fill="rgba(212,136,42,0.18)" stroke="#8B3A10" stroke-width="1.4"/>
  <circle cx="300" cy="225" r="16" fill="rgba(212,136,42,0.18)" stroke="#8B3A10" stroke-width="1.4"/>

  <!-- Hebrew letter labels -->
  <text x="200" y="81"  font-family="Georgia,serif" font-size="18"
        fill="#3A1A08" text-anchor="middle" dominant-baseline="middle">נ</text>
  <text x="100" y="231" font-family="Georgia,serif" font-size="18"
        fill="#3A1A08" text-anchor="middle" dominant-baseline="middle">ר</text>
  <text x="300" y="231" font-family="Georgia,serif" font-size="18"
        fill="#3A1A08" text-anchor="middle" dominant-baseline="middle">ב</text>

  <!-- Small node name labels -->
  <text x="200" y="57"  font-family="Georgia,serif" font-size="9"
        fill="#8B3A10" text-anchor="middle" opacity="0.75">Naomi</text>
  <text x="100" y="248" font-family="Georgia,serif" font-size="9"
        fill="#8B3A10" text-anchor="middle" opacity="0.75">Ruth</text>
  <text x="300" y="248" font-family="Georgia,serif" font-size="9"
        fill="#8B3A10" text-anchor="middle" opacity="0.75">Boaz</text>
</svg>
