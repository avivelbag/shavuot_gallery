<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#2d1b7a"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </radialGradient>
    <style>
      .ci { stroke: rgba(255,255,255,0.30); stroke-width: 0.8; }
      .cg { stroke: rgba(255,255,255,0.55); stroke-width: 0.8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Row 1 — indigo cells -->
  <polygon class="ci" fill="#1a0a4e" points="0,0 140,0 120,85 0,90"/>
  <polygon class="ci" fill="#2d1b7a" points="140,0 270,0 250,80 120,85"/>
  <polygon class="ci" fill="#1a0a4e" points="270,0 400,0 400,88 250,80"/>

  <!-- Row 2 left/right edge — indigo; centre — gold (letter area starts) -->
  <polygon class="ci" fill="#1a0a4e" points="0,90 120,85 100,175 0,180"/>
  <polygon class="cg" fill="#f5e642" points="120,85 250,80 238,178 100,175"/>
  <polygon class="ci" fill="#3d2d8e" points="250,80 400,88 400,178 238,178"/>

  <!-- Row 3 — deep gold letter area -->
  <polygon class="ci" fill="#2d1b7a" points="0,180 100,175 88,265 0,272"/>
  <polygon class="cg" fill="#e8c84a" points="100,175 180,175 168,265 88,265"/>
  <polygon class="cg" fill="#fdf6b2" points="180,175 238,178 225,265 168,265"/>
  <polygon class="cg" fill="#f5e642" points="238,178 400,178 400,268 225,265"/>

  <!-- Row 4 — indigo cells -->
  <polygon class="ci" fill="#1a0a4e" points="0,272 88,265 75,355 0,365"/>
  <polygon class="ci" fill="#2d1b7a" points="88,265 168,265 155,360 75,355"/>
  <polygon class="ci" fill="#1a0a4e" points="168,265 225,265 215,355 155,360"/>
  <polygon class="ci" fill="#3d2d8e" points="225,265 400,268 400,360 215,355"/>

  <!-- Row 5 — bottom indigo -->
  <polygon class="ci" fill="#2d1b7a" points="0,365 75,355 60,400 0,400"/>
  <polygon class="ci" fill="#1a0a4e" points="75,355 155,360 140,400 60,400"/>
  <polygon class="ci" fill="#2d1b7a" points="155,360 215,355 200,400 140,400"/>
  <polygon class="ci" fill="#1a0a4e" points="215,355 400,360 400,400 200,400"/>

  <!-- Hebrew text — rendered on top of cells -->
  <text x="200" y="230" text-anchor="middle" direction="rtl"
        font-family="'David Libre', 'Frank Ruhl Libre', serif"
        font-size="58" fill="#1a0a4e" opacity="0.90"
        font-weight="bold">נַעֲשֶׂה וְנִשְׁמַע</text>

  <!-- Subtitle -->
  <text x="200" y="282" text-anchor="middle"
        font-family="Georgia, serif" font-size="13"
        fill="#f5e642" opacity="0.75" letter-spacing="2">WE WILL DO · WE WILL HEAR</text>
</svg>
