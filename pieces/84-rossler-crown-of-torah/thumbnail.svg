<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#05040F"/>

  <!-- Rössler attractor approximation: large counterclockwise spiral with tight fold at top -->
  <!-- Main spiral body: sapphire to royal blue -->
  <defs>
    <linearGradient id="spiralGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1A8A"/>
      <stop offset="60%" stop-color="#4040CC"/>
      <stop offset="100%" stop-color="#F0C040"/>
    </linearGradient>
  </defs>

  <!-- Outer ring of the crown (high-z fold) in gold -->
  <path d="M200,80 C240,60 290,70 310,100 C330,130 325,165 300,180"
        fill="none" stroke="#F0C040" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M300,180 C280,195 255,190 240,175"
        fill="none" stroke="#F0C040" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Mid arc royal blue -->
  <path d="M200,80 C160,75 120,95 105,130 C90,165 100,210 130,240
           C160,270 200,280 240,275 C280,270 310,245 315,215
           C320,185 300,180 300,180"
        fill="none" stroke="#4040CC" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- Inner spiral body sapphire -->
  <path d="M200,200 C185,185 170,175 160,170 C140,160 120,165 115,185
           C110,205 120,230 140,245 C165,262 200,265 230,255
           C260,245 278,220 272,196 C266,172 245,160 220,162
           C195,164 178,185 185,205 C192,225 215,230 230,218
           C245,206 240,188 225,186 C210,184 200,198 205,210"
        fill="none" stroke="#2828AA" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Deep sapphire inner loops -->
  <path d="M205,210 C208,218 218,222 226,216 C234,210 232,198 222,194
           C212,190 202,198 204,208"
        fill="none" stroke="#1A1A8A" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>

  <!-- Hebrew letter כ (kaf) in faint gold at center -->
  <text x="195" y="218" font-family="serif" font-size="42" font-weight="bold"
        fill="#F0C040" opacity="0.25" text-anchor="middle" dominant-baseline="middle">כ</text>
</svg>
