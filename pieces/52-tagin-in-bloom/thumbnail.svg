<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#12122e"/>
      <stop offset="100%" stop-color="#0A0A1F"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- Tendril crown shapes radiating upward — represent reaction-diffusion growth -->
  <g stroke="#FFD700" stroke-width="0.7" fill="none" opacity="0.55" filter="url(#glow)">
    <!-- Left crown tendrils -->
    <path d="M 52 88 Q 44 72 40 58 Q 38 44 42 36"/>
    <path d="M 52 88 Q 48 70 44 54 Q 42 40 48 30"/>
    <path d="M 52 88 Q 54 68 50 50 Q 48 36 56 28"/>
    <path d="M 52 88 Q 58 66 58 48 Q 60 32 70 26"/>
    <!-- Center crown tendrils -->
    <path d="M 100 86 Q 88 68 82 52 Q 78 36 84 24"/>
    <path d="M 100 86 Q 94 66 90 50 Q 88 34 96 22"/>
    <path d="M 100 86 Q 100 64 100 48 Q 100 32 102 20"/>
    <path d="M 100 86 Q 106 64 110 48 Q 114 32 108 20"/>
    <path d="M 100 86 Q 114 68 118 52 Q 122 36 116 24"/>
    <!-- Right crown tendrils -->
    <path d="M 148 88 Q 140 70 142 54 Q 144 38 138 28"/>
    <path d="M 148 88 Q 148 70 146 52 Q 146 36 152 26"/>
    <path d="M 148 88 Q 154 68 156 52 Q 158 36 152 24"/>
    <path d="M 148 88 Q 158 70 162 54 Q 164 40 158 30"/>
    <!-- Horizontal spreading tendrils -->
    <path d="M 52 92 Q 32 90 22 84 Q 16 78 18 70"/>
    <path d="M 148 92 Q 168 90 178 84 Q 184 78 182 70"/>
    <path d="M 80 90 Q 70 80 62 76 Q 54 74 50 78"/>
    <path d="M 120 90 Q 130 80 138 76 Q 146 74 150 78"/>
  </g>

  <!-- Softer secondary tendrils -->
  <g stroke="#c8a030" stroke-width="0.4" fill="none" opacity="0.35">
    <path d="M 52 94 Q 46 78 50 62 Q 54 46 46 38"/>
    <path d="M 100 90 Q 86 72 88 56 Q 90 40 80 32"/>
    <path d="M 100 90 Q 112 72 112 56 Q 112 40 120 32"/>
    <path d="M 148 94 Q 152 78 150 62 Q 148 46 154 38"/>
  </g>

  <!-- Hebrew letters תּוֹרָה in gold -->
  <text
    x="100" y="112"
    font-family="serif"
    font-size="38"
    font-weight="bold"
    text-anchor="middle"
    fill="#FFD700"
    opacity="0.92"
    filter="url(#glow)"
  >תּוֹרָה</text>

  <!-- Tagin mnemonic letters small at bottom -->
  <text
    x="100" y="168"
    font-family="serif"
    font-size="11"
    text-anchor="middle"
    fill="#c8a030"
    opacity="0.6"
  >שׁ עָ טָ נָ זָ גָ יָ</text>

  <!-- Subtitle -->
  <text
    x="100" y="186"
    font-family="serif"
    font-size="7"
    text-anchor="middle"
    fill="#4a4a7a"
    letter-spacing="1"
  >TAGIN IN BLOOM</text>
</svg>
